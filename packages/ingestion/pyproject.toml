[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "communityone-ingestion"
version = "0.1.0"
description = "Data-source ingestion pipelines (scripts/datasources/* ports) built on core-lib."
requires-python = ">=3.11"
dependencies = [
    "core-lib",
    # ingestion.geocode reuses llm.gemini.enrich_analysis_places._nominatim_geocode
    "communityone-llm",
    # ingestion.municipal reuses scrapers.municipal.council_roster
    "communityone-scrapers",
    "pandas>=2.1",
    "pyarrow>=14",
    "zipfile-deflate64>=0.2",
    # MDM entity resolution (ingestion.mdm) — Splink on the Postgres warehouse
    "splink>=4.0",
    "sqlalchemy>=2.0",
    "psycopg2-binary>=2.9",
]

[tool.setuptools.packages.find]
where = ["src"]

[tool.uv.sources]
core-lib = { workspace = true }
communityone-llm = { workspace = true }
communityone-scrapers = { workspace = true }
