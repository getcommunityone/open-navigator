# Every.org cause taxonomy — vendored source-of-truth.
#
# Every.org does not expose a public "list all causes" endpoint, so this file
# is the canonical raw source for the EveryorgCausesPipeline (loads into
# bronze.bronze_everyorg_causes). The schema mirrors the columns the legacy
# data/gold/causes_everyorg_causes.parquet carried.
#
# Provenance: https://www.every.org/causes (curated taxonomy, ~39 entries).
#
# Bootstrapping note: this seed lists a small representative subset of
# Every.org's well-known cause slugs. To populate the full production
# taxonomy with accurate popularity_rank / descriptions / icons, replace this
# file (or drop a CSV/parquet with the same columns at
# data/cache/everyorg/causes.{csv,parquet} — the pipeline prefers the cache
# path when present).

causes:
  - cause_id: animals
    cause_name: Animals
    description: Organizations protecting and caring for animals.
    icon: "🐾"
    category: animals
    parent_id: null
    popularity_rank: 1

  - cause_id: arts
    cause_name: Arts & Culture
    description: Organizations supporting arts, culture, and humanities.
    icon: "🎨"
    category: arts
    parent_id: null
    popularity_rank: 2

