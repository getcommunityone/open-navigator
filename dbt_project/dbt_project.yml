
# Sister project file at repo root: ../dbt_project.yml (for dbt without --project-dir).
# When you change models/seeds/snapshots/vars here, mirror those sections in ../dbt_project.yml.

# Name your project! Project names should contain only lowercase characters
# and underscores. A good package name should reflect your organization's
# name or the intended use of these models
name: 'open_navigator_dbt'
version: '1.0.0'
config-version: 2

# This setting configures which "profile" dbt uses for this project.
profile: 'open_navigator'

# Roll the next month's partition forward for the partitioned event_* AI-extraction
# marts on every run. Guarded: no-op until the partitioned parent is bootstrapped
# (dbt run-operation bootstrap_event_people). See macros/event_extractions.sql.
on-run-start:
  - "{{ ensure_event_partitions('public.event_person') }}"
  - "{{ ensure_event_partitions('public.event_decision') }}"
  - "{{ ensure_event_partitions('public.event_place') }}"
  - "{{ ensure_event_partitions('public.event_financial_item') }}"
  - "{{ ensure_event_partitions('public.event_topic') }}"
  - "{{ ensure_event_partitions('public.event_bill') }}"
  - "{{ ensure_event_partitions('public.event_organization') }}"

# Rebuild-proof the /search performance indexes. Per-model post_hooks declare them,
# but some rebuild paths skip post_hooks and silently drop them, turning text-search
# legs into multi-second seq-scans that blow the homepage past the frontend's
# fetch-abort. This re-ensures them idempotently after every run.
# See macros/ensure_search_indexes.sql.
on-run-end:
  - "{{ ensure_search_indexes() }}"

# These configurations specify where dbt should look for different types of files.
# The `model-paths` config, for example, states that models in this project can be
# found in the "models/" directory. You probably won't need to change these!
model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"  # directory which will store compiled SQL files
clean-targets:         # directories to be removed by `dbt clean`
  - "target"
  - "dbt_packages"

# Configuring models
# Full documentation: https://docs.getdbt.com/docs/configuring-models

models:
  open_navigator_dbt:
    # Staging models - bronze data cleaning
    staging:
      +materialized: view
      +schema: staging
      
    # Intermediate models - deduplication and matching  
    intermediate:
      +materialized: table
      +schema: intermediate
      
    # Marts - production-ready tables
    marts:
      +materialized: incremental
      # Use default public schema (don't specify +schema to avoid public_public)
      +on_schema_change: sync_all_columns
      +unique_key: id

# Seeds configuration
seeds:
  open_navigator_dbt:
    +schema: seeds

# Snapshots configuration
snapshots:
  open_navigator_dbt:
    +target_schema: snapshots
    +unique_key: id
    +strategy: timestamp
    +updated_at: last_updated

# Variables
vars:
  # Confidence score thresholds
  confidence_authoritative: 1.0
  confidence_high: 0.90
  confidence_medium: 0.70
  confidence_ai: 0.60
  confidence_low: 0.50
  
  # Fuzzy matching threshold
  fuzzy_match_threshold: 0.85
  
  # Datasources
  authoritative_sources: ['openstates_api', 'irs_bmf', 'irs_990']
  ai_sources: ['gemini_ai_extraction']

  # int_jurisdictions: nearest ZCTA → zip column (slow). Default false keeps zip NULL.
  include_nearest_postal_zip: false

  # --- Civic interestingness score (item_interestingness / item_flags) ---
  # Composite time decay. 30 is a fine live-feed default; 90 better fits this
  # corpus (71% current-year, long historical tail) so old items sink gracefully
  # without collapsing the whole distribution to 0. Tunable per run via --vars.
  civic_half_life_days: 90
  # Trailing peer window (days) for percentile normalization within a size tier.
  civic_peer_window_days: 365
  # Forward 'soon' lens horizon (days) for the urgency component.
  civic_urgency_horizon_days: 14
  # Per-request proximity radius (meters) for rank_for_user. Static score excludes it.
  civic_proximity_radius_m: 40000
  # --- feature flags for signals with no data source yet (default off = honest stub) ---
  civic_enable_fee_tax_bonus: false        # is_new_or_increased_fee_tax not extracted
  civic_fee_tax_bonus: 0.15
  civic_enable_buried_no_discussion: false # treat any high-money item as buried when no discussion signal
  # --- item_flags detectors (default off; most await a data source) ---
  civic_flag_threshold_structuring: true   # ON: global-limit approximation ($50k) until per-jurisdiction limits land
  civic_approval_limit: 50000
  civic_structuring_band: 0.1
