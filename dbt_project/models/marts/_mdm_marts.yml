version: 2

models:
  - name: mdm_address
    description: >
      MDM golden record — one row per resolved address. PK master_address_id.
    config:
      materialized: table
      on_schema_change: fail
      contract:
        enforced: true
    columns:
      - name: master_address_id
        data_type: text
        constraints:
          - type: not_null
          - type: primary_key
      - name: address_norm
        data_type: text
      - name: street_number
        data_type: text
      - name: street_name
        data_type: text
      - name: city_norm
        data_type: text
      - name: state_code
        data_type: text
      - name: zip5
        data_type: text
      - name: lat
        data_type: double precision
      - name: lon
        data_type: double precision
      - name: n_occurrences
        data_type: bigint
      - name: n_sources
        data_type: bigint

  - name: mdm_bridge_address_xref
    description: >
      MDM crosswalk — one row per source address occurrence. PK address_uid,
      FK master_address_id -> mdm_address.
    config:
      materialized: table
      on_schema_change: fail
      contract:
        enforced: true
    constraints:
      - type: foreign_key
        columns: [master_address_id]
        to: ref('mdm_address')
        to_columns: [master_address_id]
    columns:
      - name: master_address_id
        data_type: text
        constraints:
          - type: not_null
      - name: source_system
        data_type: text
      - name: source_pk
        data_type: text
      - name: address_uid
        data_type: text
        constraints:
          - type: not_null
          - type: primary_key
      - name: raw_address
        data_type: text

  - name: mdm_bridge_address_county
    description: >
      MDM many-to-many: master address <-> county via ZIP allocation. PK
      address_county_id, FK master_address_id -> mdm_address.
    config:
      materialized: table
      on_schema_change: fail
      contract:
        enforced: true
    constraints:
      - type: foreign_key
        columns: [master_address_id]
        to: ref('mdm_address')
        to_columns: [master_address_id]
    columns:
      - name: address_county_id
        data_type: text
        constraints:
          - type: not_null
          - type: primary_key
      - name: master_address_id
        data_type: text
        constraints:
          - type: not_null
      - name: zip5
        data_type: text
      - name: state_code
        data_type: text
      - name: county_name
        data_type: text
      - name: usps_city
        data_type: text
      - name: allocation_ratio
        data_type: numeric
      - name: is_dominant
        data_type: boolean

  - name: mdm_person
    description: >
      MDM canonical public person table. One row per usable person occurrence from
      the conformed pool (entity_type = 'person', is_probable_person), keyed on
      person_uid. Replaces the retired contacts_search_ai model. Golden-record
      dedup (master_person_id) lands once int_persons__clustered exists.
    config:
      materialized: table
      on_schema_change: fail
      contract:
        enforced: true
    columns:
      - name: person_uid
        data_type: text
        constraints:
          - type: not_null
          - type: primary_key
      - name: master_person_id
        data_type: text
        description: >
          Splink-resolved canonical person id (cluster id). Falls back to person_uid
          (singleton) until the linker is re-run. From int_persons__clustered.
        constraints:
          - type: not_null
      - name: match_confidence
        data_type: double precision
        description: >
          Strongest incident Splink edge probability for this occurrence. NULL when
          isolated (no candidate edge) or before the confidence-retaining linker re-run.
      - name: review_status
        data_type: text
        description: >
          'needs_review' when match_confidence is below the 0.99 auto-merge bar
          (a predicted-but-unmerged candidate, mirrored in pending_mdm_person), else
          'auto_accepted'.
      - name: source_system
        data_type: text
      - name: source_pk
        data_type: text
      - name: full_name
        data_type: text
      - name: name_norm
        data_type: text
      - name: given_name_norm
        data_type: text
      - name: family_name_norm
        data_type: text
      - name: name_phonetic_first
        data_type: text
      - name: name_phonetic_last
        data_type: text
      - name: email
        data_type: text
      - name: phone
        data_type: text
      - name: city_norm
        data_type: text
      - name: state_code
        data_type: text
      - name: zip5
        data_type: text

  - name: mdm_bridge_person_address
    description: >
      MDM person <-> address (parcel owners today). PK person_uid, FK person_uid
      -> mdm_person, FK master_address_id -> mdm_address.
    config:
      materialized: table
      on_schema_change: fail
      contract:
        enforced: true
    constraints:
      - type: foreign_key
        columns: [person_uid]
        to: ref('mdm_person')
        to_columns: [person_uid]
      - type: foreign_key
        columns: [master_address_id]
        to: ref('mdm_address')
        to_columns: [master_address_id]
    columns:
      - name: person_uid
        data_type: text
        constraints:
          - type: not_null
          - type: primary_key
      - name: person_name
        data_type: text
      - name: relationship
        data_type: text
      - name: address_uid
        data_type: text
      - name: master_address_id
        data_type: text
        constraints:
          - type: not_null

  - name: mdm_person_source_link
    description: >
      MDM: source-system page link per person occurrence (scraped profile/page,
      LEDB ballotpedia). PK person_uid, FK person_uid -> mdm_person.
    config:
      materialized: table
      on_schema_change: fail
      contract:
        enforced: true
    constraints:
      - type: foreign_key
        columns: [person_uid]
        to: ref('mdm_person')
        to_columns: [person_uid]
    columns:
      - name: person_uid
        data_type: text
        constraints:
          - type: not_null
          - type: primary_key
      - name: master_person_id
        data_type: text
        description: "Splink-resolved canonical person id (from int_persons__clustered)."
      - name: match_confidence
        data_type: double precision
        description: "Strongest incident Splink edge probability; NULL until the linker re-run."
      - name: full_name
        data_type: text
      - name: source_system
        data_type: text
      - name: source_pk
        data_type: text
      - name: source_url
        data_type: text
      - name: profile_url
        data_type: text
      - name: source_page_url
        data_type: text

  - name: mdm_organization
    description: >
      MDM golden record — one row per resolved organization, canonical org_type.
      Canonical public org table. PK master_org_id. The governing jurisdiction is
      resolved separately in mdm_bridge_org_jurisdiction.
    config:
      materialized: table
      on_schema_change: fail
      contract:
        enforced: true
    columns:
      - name: master_org_id
        data_type: text
        constraints:
          - type: not_null
          - type: primary_key
      - name: org_name
        data_type: text
      - name: org_name_norm
        data_type: text
      - name: org_type
        data_type: text
      - name: org_subtype
        data_type: text
      - name: ein
        data_type: text
      - name: city_norm
        data_type: text
      - name: state_code
        data_type: text
      - name: zip5
        data_type: text
      - name: lat
        data_type: double precision
      - name: lon
        data_type: double precision
      - name: website
        data_type: text
      - name: n_occurrences
        data_type: bigint
      - name: n_sources
        data_type: bigint
      - name: first_seen_year
        data_type: integer
      - name: last_seen_year
        data_type: integer

  - name: mdm_bridge_org_address
    description: >
      MDM organization <-> address. located_at (shared bronze_locations row) and
      parcel_owner (shared bronze_addresses parcel row). PK org_address_id, FKs to
      org + address masters.
    config:
      materialized: table
      on_schema_change: fail
      contract:
        enforced: true
    constraints:
      - type: foreign_key
        columns: [master_org_id]
        to: ref('mdm_organization')
        to_columns: [master_org_id]
      - type: foreign_key
        columns: [master_address_id]
        to: ref('mdm_address')
        to_columns: [master_address_id]
    columns:
      - name: org_address_id
        data_type: text
        constraints:
          - type: not_null
          - type: primary_key
      - name: master_org_id
        data_type: text
        constraints:
          - type: not_null
      - name: master_address_id
        data_type: text
        constraints:
          - type: not_null
      - name: relationship
        data_type: text
      - name: as_of_year
        data_type: integer

  - name: pending_mdm_person
    description: >
      MDM human-review queue for person records not served as-is. pending_reason
      distinguishes 'not_probable_person' (failed the is_probable_person heuristic, e.g.
      org acronyms like "HHS" — never reach mdm_person) from 'ambiguous_match' (Splink
      predicted a match but below the 0.99 auto-merge bar; these DO stay in mdm_person
      flagged review_status='needs_review'). PK person_uid. Intentionally NO FK to
      mdm_person — the 'not_probable_person' rows are not in mdm_person by design.
    config:
      materialized: table
      on_schema_change: fail
      contract:
        enforced: true
    columns:
      - name: person_uid
        data_type: text
        constraints:
          - type: not_null
          - type: primary_key
      - name: full_name
        data_type: text
      - name: source_system
        data_type: text
      - name: source_pk
        data_type: text
      - name: state_code
        data_type: text
      - name: city_norm
        data_type: text
      - name: pending_reason
        data_type: text
        description: "'not_probable_person' | 'ambiguous_match'."
      - name: match_confidence
        data_type: double precision
        description: "Splink probability of the strongest candidate edge (ambiguous_match only; NULL for junk)."
      - name: candidate_person_uid
        data_type: text
        description: "The most-likely counterpart occurrence for an ambiguous_match (NULL for junk)."
