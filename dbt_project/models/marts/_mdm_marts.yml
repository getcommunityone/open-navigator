version: 2

models:
  - name: mdm_address
    description: >
      MDM golden record — one row per resolved address. PK master_address_id.
    config:
      materialized: table
      on_schema_change: fail
      contract:
        enforced: true
    columns:
      - name: master_address_id
        data_type: text
        constraints:
          - type: not_null
          - type: primary_key
      - name: address_norm
        data_type: text
      - name: street_number
        data_type: text
      - name: street_name
        data_type: text
      - name: city_norm
        data_type: text
      - name: state_code
        data_type: text
      - name: zip5
        data_type: text
      - name: lat
        data_type: double precision
      - name: lon
        data_type: double precision
      - name: n_occurrences
        data_type: bigint
      - name: n_sources
        data_type: bigint

  - name: mdm_bridge_address_xref
    description: >
      MDM crosswalk — one row per source address occurrence. PK address_uid,
      FK master_address_id -> mdm_address.
    config:
      materialized: table
      on_schema_change: fail
      contract:
        enforced: true
    constraints:
      - type: foreign_key
        columns: [master_address_id]
        to: ref('mdm_address')
        to_columns: [master_address_id]
    columns:
      - name: master_address_id
        data_type: text
        constraints:
          - type: not_null
      - name: source_system
        data_type: text
      - name: source_pk
        data_type: text
      - name: address_uid
        data_type: text
        constraints:
          - type: not_null
          - type: primary_key
      - name: raw_address
        data_type: text

  - name: mdm_bridge_address_county
    description: >
      MDM many-to-many: master address <-> county via ZIP allocation. PK
      address_county_id, FK master_address_id -> mdm_address.
    config:
      materialized: table
      on_schema_change: fail
      contract:
        enforced: true
    constraints:
      - type: foreign_key
        columns: [master_address_id]
        to: ref('mdm_address')
        to_columns: [master_address_id]
    columns:
      - name: address_county_id
        data_type: text
        constraints:
          - type: not_null
          - type: primary_key
      - name: master_address_id
        data_type: text
        constraints:
          - type: not_null
      - name: zip5
        data_type: text
      - name: state_code
        data_type: text
      - name: county_name
        data_type: text
      - name: usps_city
        data_type: text
      - name: allocation_ratio
        data_type: numeric
      - name: is_dominant
        data_type: boolean

  - name: mdm_person
    description: >
      MDM canonical public person table. One row per usable person occurrence from
      the conformed pool (entity_type = 'person', is_probable_person), keyed on
      person_uid. Replaces the retired contacts_search_ai model. Golden-record
      dedup (master_person_id) lands once int_persons__clustered exists.
    config:
      materialized: table
      on_schema_change: fail
      contract:
        enforced: true
    columns:
      - name: person_uid
        data_type: text
        constraints:
          - type: not_null
          - type: primary_key
      - name: master_person_id
        data_type: text
        description: >
          Splink-resolved canonical person id (cluster id). Falls back to person_uid
          (singleton) until the linker is re-run. From int_persons__clustered.
        constraints:
          - type: not_null
      - name: match_confidence
        data_type: double precision
        description: >
          Strongest incident Splink edge probability for this occurrence. NULL when
          isolated (no candidate edge) or before the confidence-retaining linker re-run.
      - name: review_status
        data_type: text
        description: >
          'needs_review' when match_confidence is below the 0.99 auto-merge bar
          (a predicted-but-unmerged candidate, mirrored in pending_mdm_person), else
          'auto_accepted'.
      - name: source_system
        data_type: text
      - name: source_pk
        data_type: text
      - name: full_name
        data_type: text
      - name: name_norm
        data_type: text
      - name: given_name_norm
        data_type: text
      - name: family_name_norm
        data_type: text
      - name: name_phonetic_first
        data_type: text
      - name: name_phonetic_last
        data_type: text
      - name: email
        data_type: text
      - name: phone
        data_type: text
      - name: city_norm
        data_type: text
      - name: state_code
        data_type: text
      - name: zip5
        data_type: text

  - name: mdm_bridge_person_address
    description: >
      MDM person <-> address (parcel owners today). PK person_uid, FK person_uid
      -> mdm_person, FK master_address_id -> mdm_address.
    config:
      materialized: table
      on_schema_change: fail
      contract:
        enforced: true
    constraints:
      - type: foreign_key
        columns: [person_uid]
        to: ref('mdm_person')
        to_columns: [person_uid]
      - type: foreign_key
        columns: [master_address_id]
        to: ref('mdm_address')
        to_columns: [master_address_id]
    columns:
      - name: person_uid
        data_type: text
        constraints:
          - type: not_null
          - type: primary_key
      - name: person_name
        data_type: text
      - name: relationship
        data_type: text
      - name: address_uid
        data_type: text
      - name: master_address_id
        data_type: text
        constraints:
          - type: not_null

  - name: mdm_bridge_person_jurisdiction
    description: >
      MDM many-to-many: person <-> jurisdiction across three geographic tiers
      (state, city, county). Powers location-scoped people search. Grain one row
      per (person_uid, jurisdiction_id). State tier from state_code, city tier
      from normalized city_norm + state_code, county tier from zip5 via the HUD
      ZIP->county crosswalk (allocation_ratio = tot_ratio; is_dominant marks the
      best row per (person, level)). PK person_jurisdiction_id; FK person_uid ->
      mdm_person and FK jurisdiction_id -> jurisdictions are added NOT VALID via the
      model's post_hook (not the contract constraints block) so the bulk INSERT
      isn't row-by-row FK-validated against 13.8M-row mdm_person (~5 min/FK); they
      still enforce future writes.
    config:
      materialized: table
      on_schema_change: fail
      contract:
        enforced: true
    columns:
      - name: person_jurisdiction_id
        data_type: text
        constraints:
          - type: not_null
          - type: primary_key
      - name: person_uid
        data_type: text
        constraints:
          - type: not_null
      - name: jurisdiction_id
        data_type: text
        constraints:
          - type: not_null
      - name: jurisdiction_level
        data_type: text
        description: "'city' | 'county' | 'state'."
      - name: match_method
        data_type: text
        description: "How the link was derived: 'state_code' | 'city_name_state' | 'zip5_hud'."
      - name: allocation_ratio
        data_type: numeric
        description: "HUD ZIP->county tot_ratio; NULL except the county tier."
      - name: is_dominant
        data_type: boolean
        description: "TRUE for the single best row per (person, level); the max-tot_ratio county per person."

  - name: mdm_person_source_link
    description: >
      MDM: source-system page link per person occurrence (scraped profile/page,
      LEDB ballotpedia). PK person_uid, FK person_uid -> mdm_person.
    config:
      materialized: table
      on_schema_change: fail
      contract:
        enforced: true
    constraints:
      - type: foreign_key
        columns: [person_uid]
        to: ref('mdm_person')
        to_columns: [person_uid]
    columns:
      - name: person_uid
        data_type: text
        constraints:
          - type: not_null
          - type: primary_key
      - name: master_person_id
        data_type: text
        description: "Splink-resolved canonical person id (from int_persons__clustered)."
      - name: match_confidence
        data_type: double precision
        description: "Strongest incident Splink edge probability; NULL until the linker re-run."
      - name: full_name
        data_type: text
      - name: source_system
        data_type: text
      - name: source_pk
        data_type: text
      - name: source_url
        data_type: text
      - name: profile_url
        data_type: text
      - name: source_page_url
        data_type: text

  - name: mdm_organization
    description: >
      MDM golden record — one row per resolved organization, canonical org_type.
      Canonical public org table. PK master_org_id. The governing jurisdiction is
      resolved separately in mdm_bridge_org_jurisdiction.
    config:
      materialized: table
      on_schema_change: fail
      contract:
        enforced: true
    columns:
      - name: master_org_id
        data_type: text
        constraints:
          - type: not_null
          - type: primary_key
      - name: org_name
        data_type: text
      - name: org_name_norm
        data_type: text
      - name: org_type
        data_type: text
      - name: org_subtype
        data_type: text
      - name: ein
        data_type: text
      - name: city_norm
        data_type: text
      - name: state_code
        data_type: text
      - name: zip5
        data_type: text
      - name: lat
        data_type: double precision
      - name: lon
        data_type: double precision
      - name: website
        data_type: text
      - name: n_occurrences
        data_type: bigint
      - name: n_sources
        data_type: bigint
      - name: first_seen_year
        data_type: integer
      - name: last_seen_year
        data_type: integer
      - name: former_names
        data_type: jsonb
        description: >
          Prior org names for this golden record (most-recent-first), i.e. every
          distinct name except the current org_name. Empty array when the name has
          never changed. See name_history for the year spans.
      - name: name_history
        data_type: jsonb
        description: >
          Full name history: array of {name, name_norm, first_year, last_year,
          sources} for every distinct name observed in the cluster, newest last_year
          first. Years are JSON strings (e.g. "2024") per the calendar-year
          convention. They are observation years (source as_of_year), not legal
          change dates — they bound a rename rather than pinpoint it.
      - name: current_name_since_year
        data_type: integer
        description: >
          Earliest year the current org_name was observed (the current name's
          first_year in name_history). Approximate "in use since" for the name.
      - name: has_name_change
        data_type: boolean
        description: True when the cluster carries more than one distinct name.

  - name: mdm_bridge_org_address
    description: >
      MDM organization <-> address. located_at (shared bronze_locations row) and
      parcel_owner (shared bronze_addresses parcel row). PK org_address_id, FKs to
      org + address masters.
    config:
      materialized: table
      on_schema_change: fail
      contract:
        enforced: true
    constraints:
      - type: foreign_key
        columns: [master_org_id]
        to: ref('mdm_organization')
        to_columns: [master_org_id]
      - type: foreign_key
        columns: [master_address_id]
        to: ref('mdm_address')
        to_columns: [master_address_id]
    columns:
      - name: org_address_id
        data_type: text
        constraints:
          - type: not_null
          - type: primary_key
      - name: master_org_id
        data_type: text
        constraints:
          - type: not_null
      - name: master_address_id
        data_type: text
        constraints:
          - type: not_null
      - name: relationship
        data_type: text
      - name: as_of_year
        data_type: integer

  - name: mdm_bridge_org_jurisdiction
    description: >
      MDM many-to-many: organization <-> jurisdiction across three geographic
      tiers (state, city, county). Powers location-scoped org search. Grain one
      row per (master_org_id, jurisdiction_id). State tier from state_code, city
      tier from normalized city_norm + state_code, county tier from zip5 via the
      HUD ZIP->county crosswalk (allocation_ratio = tot_ratio; is_dominant marks
      the best row per (org, level)). PK org_jurisdiction_id; FK master_org_id ->
      mdm_organization and FK jurisdiction_id -> jurisdictions are added NOT VALID
      via the model's post_hook (not the contract constraints block) so the bulk
      INSERT isn't row-by-row FK-validated over millions of rows; they still enforce
      future writes.
    config:
      materialized: table
      on_schema_change: fail
      contract:
        enforced: true
    columns:
      - name: org_jurisdiction_id
        data_type: text
        constraints:
          - type: not_null
          - type: primary_key
      - name: master_org_id
        data_type: text
        constraints:
          - type: not_null
      - name: jurisdiction_id
        data_type: text
        constraints:
          - type: not_null
      - name: jurisdiction_level
        data_type: text
        description: "'city' | 'county' | 'state'."
      - name: match_method
        data_type: text
        description: "How the link was derived: 'state_code' | 'city_name_state' | 'zip5_hud'."
      - name: allocation_ratio
        data_type: numeric
        description: "HUD ZIP->county tot_ratio; NULL except the county tier."
      - name: is_dominant
        data_type: boolean
        description: "TRUE for the single best row per (org, level); the max-tot_ratio county per org."

  - name: pending_mdm_person
    description: >
      MDM human-review queue for person records not served as-is. pending_reason
      distinguishes 'not_probable_person' (failed the is_probable_person heuristic, e.g.
      org acronyms like "HHS" — never reach mdm_person) from 'ambiguous_match' (Splink
      predicted a match but below the 0.99 auto-merge bar; these DO stay in mdm_person
      flagged review_status='needs_review'). PK person_uid. Intentionally NO FK to
      mdm_person — the 'not_probable_person' rows are not in mdm_person by design.
    config:
      materialized: table
      on_schema_change: fail
      contract:
        enforced: true
    columns:
      - name: person_uid
        data_type: text
        constraints:
          - type: not_null
          - type: primary_key
      - name: full_name
        data_type: text
      - name: source_system
        data_type: text
      - name: source_pk
        data_type: text
      - name: state_code
        data_type: text
      - name: city_norm
        data_type: text
      - name: pending_reason
        data_type: text
        description: "'not_probable_person' | 'ambiguous_match'."
      - name: match_confidence
        data_type: double precision
        description: "Splink probability of the strongest candidate edge (ambiguous_match only; NULL for junk)."
      - name: candidate_person_uid
        data_type: text
        description: "The most-likely counterpart occurrence for an ambiguous_match (NULL for junk)."

  - name: mdm_bridge_person_organization
    description: >
      MDM organization-officer bridge — IRS Form 990 Part VII people (officers,
      directors, trustees, key employees) mapped to their resolved organization,
      with full year-by-year role + compensation history. Grain one row per
      (officer person, organization, tax_year). PK org_person_year_id, FK
      master_org_id -> mdm_organization. Person side keyed on the deterministic
      officer_person_uid (name + EIN); not yet resolved into mdm_person, so no
      person FK. Geography is inherited from the organization.
    config:
      materialized: table
      on_schema_change: fail
      contract:
        enforced: true
    constraints:
      - type: foreign_key
        columns: [master_org_id]
        to: ref('mdm_organization')
        to_columns: [master_org_id]
    columns:
      - name: org_person_year_id
        data_type: text
        constraints:
          - type: not_null
          - type: primary_key
      - name: officer_person_uid
        data_type: text
        description: "md5(name_norm | EIN) — officer identity scoped to the org, stable across years."
      - name: person_name
        data_type: text
      - name: name_norm
        data_type: text
      - name: master_org_id
        data_type: text
        constraints:
          - type: not_null
      - name: org_name
        data_type: text
      - name: tax_year
        data_type: integer
      - name: title
        data_type: text
      - name: is_officer
        data_type: boolean
      - name: is_director_trustee
        data_type: boolean
      - name: is_institutional_trustee
        data_type: boolean
      - name: is_key_employee
        data_type: boolean
      - name: is_highest_comp
        data_type: boolean
      - name: is_former
        data_type: boolean
      - name: avg_hours_org
        data_type: numeric
      - name: avg_hours_related
        data_type: numeric
      - name: reportable_comp_org
        data_type: bigint
      - name: reportable_comp_related
        data_type: bigint
      - name: other_comp
        data_type: bigint
      - name: city_norm
        data_type: text
      - name: state_code
        data_type: text
      - name: zip5
        data_type: text
      - name: lat
        data_type: double precision
      - name: lon
        data_type: double precision
      - name: source_url
        data_type: text
