version: 2

# public.nonprofit_sector_revenue — pre-aggregation of the 990 nonprofit-sector
# revenue decomposition, serving the /api/money-flow "economy" lens at three
# grains (us / state / city). Replaces a per-request SUM over the 3.6M-row
# mdm_organization_nonprofit satellite. Keyed by scope_key so the API can look up
# the most specific available row ('city:AL|tuscaloosa' -> 'state:AL' -> 'us').

models:
  - name: nonprofit_sector_revenue
    description: >
      Pre-computed 990 nonprofit-sector revenue decomposition (contributions,
      program-service revenue, total revenue, org count) at us / per-state /
      per-city grains, so the money-flow "economy" lens reads one row scoped to
      the visitor's jurisdiction instead of scanning the full satellite per
      request. Geography comes from the 1:1 mdm_organization join (state_code /
      city_norm).
    config:
      materialized: table
      on_schema_change: fail
      contract:
        enforced: true
    columns:
      - name: scope_key
        description: "PK; encodes grain + place: 'us', 'state:<code>', or 'city:<code>|<city_norm>'."
        data_type: text
        constraints:
          - type: not_null
          - type: primary_key
        tests:
          - unique
          - not_null
      - name: scope
        description: "Grain of the row: 'us' | 'state' | 'city'."
        data_type: text
        constraints:
          - type: not_null
        tests:
          - accepted_values:
              values: ['us', 'state', 'city']
      - name: state_code
        description: "2-letter state code; NULL for the 'us' grain."
        data_type: text
      - name: city_norm
        description: "Normalized (lowercased) city name; NULL for the 'us' and 'state' grains."
        data_type: text
      - name: contributions
        description: "SUM of gt990_total_contributions across the scope's 990-filing nonprofits."
        data_type: bigint
        constraints:
          - type: not_null
      - name: program_service_revenue
        description: "SUM of gt990_program_service_revenue for the scope."
        data_type: bigint
        constraints:
          - type: not_null
      - name: total_revenue
        description: "SUM of COALESCE(gt990_total_revenue, revenue) for the scope."
        data_type: bigint
        constraints:
          - type: not_null
      - name: org_count
        description: "COUNT of nonprofit org rows feeding the aggregate."
        data_type: bigint
        constraints:
          - type: not_null
      - name: dbt_loaded_at
        data_type: timestamp with time zone
