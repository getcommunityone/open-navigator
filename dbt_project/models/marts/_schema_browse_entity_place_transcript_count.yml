version: 2

# public.browse_entity_place_transcript_count — per-(entity, PLACE) count of
# distinct transcripts linked to each browseable homepage entity. The city-grain
# sibling of browse_entity_state_transcript_count (which keeps only the per-state
# grain). Lets the browse pages filter to a single city like Tuscaloosa, AL.
#
# Keys (per CLAUDE.md, enforced as Postgres constraints via contract):
#   - PK: (entity_type, entity_id, state_code, jurisdiction_name) — composite,
#     one row per entity per place. BOTH state_code AND jurisdiction_name are part
#     of the key and never NULL (a city-scoped count needs a fully resolved place).
#   - No FK: entity_id is polymorphic (geoid | topic_id | question_id), so it
#     cannot reference a single parent table — relationships are validated
#     upstream in the bridge int_browse_entity_transcripts.

models:
  - name: browse_entity_place_transcript_count
    description: >
      public.browse_entity_place_transcript_count — per-entity-per-place count of
      DISTINCT transcript videos (public.event_documents, document_type=
      'transcript') linked to each browseable homepage entity. Lets the browse
      pages filter to a selected city (state_code + jurisdiction_name) and show
      only the place|topic|question|cause entities actually discussed there. Both
      state_code and jurisdiction_name are never NULL. Questions are mostly absent
      at city grain (no clean place name on the question join path); causes now
      carry real city-grain keyword-FTS counts (EveryOrg taxonomy via
      int_transcript_keyword_cause) — no fabricated rows. Source:
      intermediate.int_browse_entity_transcripts.
    config:
      materialized: table
      on_schema_change: fail
      contract:
        enforced: true
    constraints:
      - type: primary_key
        columns: [entity_type, entity_id, state_code, jurisdiction_name]
    columns:
      - name: entity_type
        description: "Entity kind: 'place' | 'topic' | 'question' | 'cause'. Part of the PK."
        data_type: text
        constraints:
          - type: not_null
        data_tests:
          - not_null
          - accepted_values:
              values: ['place', 'topic', 'question', 'cause']
      - name: entity_id
        description: >
          Polymorphic entity id (part of the PK): geoid for place, topic_id for
          topic, question_id for question.
        data_type: text
        constraints:
          - type: not_null
        data_tests:
          - not_null
      - name: state_code
        description: "2-letter state the transcripts were recorded in. Part of the PK; never NULL."
        data_type: text
        constraints:
          - type: not_null
        data_tests:
          - not_null
      - name: jurisdiction_name
        description: >
          Place / city name the transcripts were recorded in. Part of the PK;
          never NULL. Carried per-video from public.event_documents.
        data_type: text
        constraints:
          - type: not_null
        data_tests:
          - not_null
      - name: entity_name
        description: "Human-readable entity label (place name / topic name / question text)."
        data_type: text
      - name: transcript_count
        description: >
          COUNT(DISTINCT video_id) of transcripts linked to this entity within
          this place. Never NULL.
        data_type: integer
        constraints:
          - type: not_null
        data_tests:
          - not_null
