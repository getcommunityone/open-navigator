version: 2

models:
  - name: bronze_organizations_nonprofits
    description: |
      Combined nonprofit organization data from IRS BMF + NCCS enrichment.
      
      This model:
      - Base: All 1.95M organizations from IRS Business Master File
      - Enrichment: Geographic coordinates, CBSA, detailed financials from NCCS (794k overlap)
      - Join strategy: LEFT JOIN on EIN (all IRS + NCCS where available)
      
      Use cases:
      - Geographic analysis: Use latitude/longitude for mapping
      - Financial analysis: Compare IRS amounts vs F990 recent values
      - Classification: Multiple NTEE versions (IRS, NCCS, NTEEv2)
      - Data quality: has_nccs_data and has_geocoding flags
      
      Data quality flags:
      - has_nccs_data: TRUE if organization found in NCCS dataset
      - has_geocoding: TRUE if latitude/longitude available
      
    config:
      tags: ['daily', 'nonprofits', 'enrichment']
      unique_key: 'ein'
      
    columns:
      - name: ein
        description: "Employer Identification Number (primary key)"
        tests:
          - unique
          - not_null
          
      - name: org_name
        description: "Organization name from IRS BMF"
        tests:
          - not_null
          
      - name: city
        description: "City from IRS BMF"
        
      - name: state_code
        description: "Two-letter state code from IRS BMF"
        tests:
          - not_null
        
      - name: ntee_cd
        description: "IRS NTEE classification code (primary)"
        
      - name: irs_asset_amt
        description: "Asset amount from IRS BMF"
        
      - name: irs_income_amt
        description: "Income amount from IRS BMF"
        
      - name: irs_revenue_amt
        description: "Revenue amount from IRS BMF"
        
      - name: latitude
        description: "Geographic latitude from NCCS (NULL if no NCCS data)"
        
      - name: longitude
        description: "Geographic longitude from NCCS (NULL if no NCCS data)"
        
      - name: census_cbsa_name
        description: "Census Core Based Statistical Area name from NCCS"
        
      - name: f990_total_revenue_recent
        description: "Most recent Form 990 total revenue from NCCS"
        
      - name: f990_total_assets_recent
        description: "Most recent Form 990 total assets from NCCS"
        
      - name: has_nccs_data
        description: "TRUE if organization has NCCS enrichment data"
        tests:
          - not_null
          
      - name: has_geocoding
        description: "TRUE if latitude/longitude coordinates available"
        tests:
          - not_null
          
      - name: last_updated
        description: "Most recent load timestamp from either IRS or NCCS"
        tests:
          - not_null
  
  - name: stats_aggregates
    description: |
      Jurisdiction-level statistics with trending causes.
      
      This model:
      - Aggregates counts of jurisdictions, nonprofits, events, contacts, bills
      - Includes trending causes (JSON) based on decisions in last 90 days
      - Provides stats at multiple levels: national, state, county, city, jurisdiction
      
      Trending causes are calculated from bronze_decisions and ranked by:
      - Decision count (number of decisions related to cause)
      - Recency (most recent decisions weighted higher)
      
    config:
      tags: ['daily', 'stats', 'aggregates']
      unique_key: ['level', 'state_code', 'county', 'city']
      
    columns:
      - name: level
        description: "Aggregation level (national, state, county, city, jurisdiction)"
        tests:
          - not_null
          - accepted_values:
              values: ['national', 'state', 'county', 'city', 'jurisdiction']
              
      - name: state_code
        description: "Two-letter state code (NULL for national)"
      
      - name: state
        description: "Full state name (NULL for national)"
        
      - name: county
        description: "County name (NULL for non-county levels)"
        
      - name: city
        description: "City/jurisdiction name (NULL for higher levels)"
        
      - name: jurisdictions_count
        description: "Number of tracked jurisdictions"
        
      - name: nonprofits_count
        description: "Number of nonprofit organizations"
        
      - name: events_count
        description: "Number of meetings/events"
        
      - name: contacts_count
        description: "Number of contacts/officials"
        
      - name: bills_count
        description: "Number of bills/legislation tracked"
        
      - name: trending_causes
        description: |
          JSON array of trending causes based on decisions in last 90 days.
          Each cause includes: category, code, decision_count, topics, most_recent, rank, sample_headlines
        
      - name: last_updated
        description: "Timestamp of last stats update"
        tests:
          - not_null
  
  - name: contacts_search_ai
    description: |
      AI-extracted contacts from meeting transcripts.
      
      This model:
      - Pulls from deduplicated bronze_contacts
      - Avoids overriding authoritative sources (OpenStates, IRS)
      - Assigns confidence_score of 0.60 for AI extractions
      - Runs incrementally (only new records since last run)
      
      Data sources merged elsewhere:
      - OpenStates legislators: loaded via Python script
      - IRS 990 nonprofit officers: loaded via Python script
      
    config:
      tags: ['daily', 'ai_extraction']
      
    columns:
      - name: id
        description: "Surrogate key (hash of name + org + datasource)"
        tests:
          - unique
          - not_null
          
      - name: name
        description: "Contact full name"
        tests:
          - not_null
          - dbt_expectations.expect_column_value_lengths_to_be_between:
              min_value: 3
              max_value: 255
          
      - name: datasource
        description: "Always 'gemini_ai_extraction' for this model"
        tests:
          - accepted_values:
              values: ['gemini_ai_extraction']
          
      - name: confidence_score
        description: "Data quality score (0.60 for AI extraction)"
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0.0
              max_value: 1.0
              
      - name: role_type
        description: "Contact role classification"
        tests:
          - accepted_values:
              values: 
                - 'lobbyist'
                - 'government_official'
                - 'other'
                - 'nonprofit_officer'
                - 'state_legislator'
              
      - name: last_updated
        description: "When this record was created/updated"
        tests:
          - not_null
