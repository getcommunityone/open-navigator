version: 2

# AI-extraction event_* marts: entities the LLM pulled out of analyzed meeting
# events, promoted from bronze.bronze_*_from_ai into public. The child entity
# tables are native range-partitioned by extracted_at (monthly) via a
# bootstrap_<model> run-operation and APPEND-loaded. See macros/event_extractions.sql.
#
# event_meeting is the NON-partitioned PARENT (one row per analysis). Each child
# carries event_<entity>_id (md5 surrogate, PK with extracted_at), extraction_key
# (stable dedup key, UNIQUE with extracted_at), analysis_id (FK -> event_meeting),
# c1_event_id (resolved canonical OCD event, relationships test at warn since
# bridge coverage is incomplete by design), and extracted_at (partition key).

models:
  - name: event_meeting
    description: "Meeting-level PARENT of the AI-extraction family — one row per analysis (analyzed meeting). Non-partitioned; child event_* tables FK into event_meeting_id. Promoted from bronze.bronze_meetings_from_ai."
    config:
      tags: ['marts', 'event-extraction', 'ai']
    columns:
      - name: event_meeting_id
        description: "Primary key — the bronze analysis id (== each child's analysis_id, the FK target)."
        data_tests: [not_null, unique]
      - name: legacy_event_id
        description: "Legacy event id; FK -> civic_event.legacy_id (the canonical event)."
        data_tests:
          - relationships:
              arguments: {to: "source('civic_core', 'civic_event')", field: legacy_id}
              config: {severity: warn}
      - name: extracted_at
        description: "When the AI analysis that produced this meeting was generated."
        data_tests: [not_null]

  - name: event_person
    description: "AI-extracted people mentioned in analyzed events. One row per (analysis, person); partitioned by extracted_at."
    config:
      tags: ['marts', 'event-extraction', 'ai']
    columns:
      - name: extraction_key
        description: "Stable dedup key (source_event_id || '_' || person_id)."
        data_tests: [not_null, unique]
      - name: event_person_id
        description: "md5 surrogate of extraction_key — primary key (with extracted_at)."
        data_tests: [not_null]
      - name: analysis_id
        description: "FK -> event_meeting.event_meeting_id (the parent meeting)."
        data_tests:
          - relationships:
              arguments: {to: "ref('event_meeting')", field: event_meeting_id}
              config: {severity: warn}
      - name: c1_event_id
        description: "Resolved canonical OCD event id (nullable until the event is promoted)."
        data_tests:
          - relationships:
              arguments: {to: "source('civic_core', 'civic_event')", field: id}
              config: {severity: warn}
      - name: extracted_at
        description: "Partition key — when the AI extraction was produced."
        data_tests: [not_null]

  - name: event_decision
    description: "AI-extracted decisions/actions (scalar cols typed, narrative blocks JSONB). One row per (analysis, decision); partitioned by extracted_at."
    config:
      tags: ['marts', 'event-extraction', 'ai']
    columns:
      - name: extraction_key
        description: "Stable dedup key (source_event_id || '_' || decision_id)."
        data_tests: [not_null, unique]
      - name: event_decision_id
        description: "md5 surrogate of extraction_key — primary key (with extracted_at)."
        data_tests: [not_null]
      - name: analysis_id
        description: "FK -> event_meeting.event_meeting_id (the parent meeting)."
        data_tests:
          - relationships:
              arguments: {to: "ref('event_meeting')", field: event_meeting_id}
              config: {severity: warn}
      - name: c1_event_id
        description: "Resolved canonical OCD event id (nullable until the event is promoted)."
        data_tests:
          - relationships:
              arguments: {to: "source('civic_core', 'civic_event')", field: id}
              config: {severity: warn}
      - name: extracted_at
        description: "Partition key — when the AI extraction was produced."
        data_tests: [not_null]

  - name: event_place
    description: "AI-extracted/geocoded places. One row per (analysis, place); event jurisdiction in state_code/state, place's own location in place_* cols. Partitioned by extracted_at."
    config:
      tags: ['marts', 'event-extraction', 'ai']
    columns:
      - name: extraction_key
        description: "Stable dedup key (source_event_id || '_' || place_id)."
        data_tests: [not_null, unique]
      - name: event_place_id
        description: "md5 surrogate of extraction_key — primary key (with extracted_at)."
        data_tests: [not_null]
      - name: analysis_id
        description: "FK -> event_meeting.event_meeting_id (the parent meeting)."
        data_tests:
          - relationships:
              arguments: {to: "ref('event_meeting')", field: event_meeting_id}
              config: {severity: warn}
      - name: c1_event_id
        description: "Resolved canonical OCD event id (nullable until the event is promoted)."
        data_tests:
          - relationships:
              arguments: {to: "source('civic_core', 'civic_event')", field: id}
              config: {severity: warn}
      - name: extracted_at
        description: "Partition key — when the AI extraction was produced."
        data_tests: [not_null]

  - name: event_financial_item
    description: "AI-extracted dollar amounts/items. One row per (analysis, financial_item); partitioned by extracted_at."
    config:
      tags: ['marts', 'event-extraction', 'ai']
    data_tests:
      # (analysis_id, financial_item_id) is the real grain. financial_item_id
      # ALONE is NOT globally unique (it collides across analyses) — any join
      # that resolves event_decision.financial_item_refs MUST also match
      # analysis_id, or one decision fans out to financial items nationwide.
      # See int_civic__item_signals.decision_money.
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: ['analysis_id', 'financial_item_id']
    columns:
      - name: extraction_key
        description: "Stable dedup key (source_event_id || '_' || financial_item_id)."
        data_tests: [not_null, unique]
      - name: event_financial_item_id
        description: "md5 surrogate of extraction_key — primary key (with extracted_at). Globally unique; use this for any cross-analysis join."
        data_tests: [not_null]
      - name: analysis_id
        description: "FK -> event_meeting.event_meeting_id (the parent meeting)."
        data_tests:
          - relationships:
              arguments: {to: "ref('event_meeting')", field: event_meeting_id}
              config: {severity: warn}
      - name: financial_item_id
        description: "Per-analysis extraction id referenced by event_decision.financial_item_refs. UNIQUE ONLY WITHIN analysis_id — never join on it alone (it collides across analyses); always pair with analysis_id."
      - name: c1_event_id
        description: "Resolved canonical OCD event id (nullable until the event is promoted)."
        data_tests:
          - relationships:
              arguments: {to: "source('civic_core', 'civic_event')", field: id}
              config: {severity: warn}
      - name: extracted_at
        description: "Partition key — when the AI extraction was produced."
        data_tests: [not_null]

  - name: event_topic
    description: "AI-extracted themes/topics (COFOG + NTEE classified). One row per (analysis, decision); partitioned by extracted_at."
    config:
      tags: ['marts', 'event-extraction', 'ai']
    columns:
      - name: extraction_key
        description: "Stable dedup key (source_event_id || '_' || decision_id)."
        data_tests: [not_null, unique]
      - name: event_topic_id
        description: "md5 surrogate of extraction_key — primary key (with extracted_at)."
        data_tests: [not_null]
      - name: analysis_id
        description: "FK -> event_meeting.event_meeting_id (the parent meeting)."
        data_tests:
          - relationships:
              arguments: {to: "ref('event_meeting')", field: event_meeting_id}
              config: {severity: warn}
      - name: c1_event_id
        description: "Resolved canonical OCD event id (nullable until the event is promoted)."
        data_tests:
          - relationships:
              arguments: {to: "source('civic_core', 'civic_event')", field: id}
              config: {severity: warn}
      - name: extracted_at
        description: "Partition key — when the AI extraction was produced."
        data_tests: [not_null]

  - name: event_organization
    description: "AI-extracted organizations, AGGREGATED to one row per org (normalized name + state) across events. Resolves first/last-seen events instead of a single c1_event_id. Partitioned by extracted_at."
    config:
      tags: ['marts', 'event-extraction', 'ai']
    columns:
      - name: extraction_key
        description: "Stable key (org_name_normalized_state_code) — already unique per org+state."
        data_tests: [not_null, unique]
      - name: id
        description: "md5 surrogate of extraction_key — FK target for downstream models."
        data_tests: [not_null]
      - name: first_seen_analysis_id
        description: "FK -> event_meeting.event_meeting_id — the earliest meeting the org was seen in."
        data_tests:
          - relationships:
              arguments: {to: "ref('event_meeting')", field: event_meeting_id}
              config: {severity: warn}
      - name: last_seen_analysis_id
        description: "FK -> event_meeting.event_meeting_id — the most recent meeting the org was seen in."
        data_tests:
          - relationships:
              arguments: {to: "ref('event_meeting')", field: event_meeting_id}
              config: {severity: warn}
      - name: last_c1_event_id
        description: "Resolved canonical OCD event id for the most recent event the org was seen in (nullable)."
        data_tests:
          - relationships:
              arguments: {to: "source('civic_core', 'civic_event')", field: id}
              config: {severity: warn}
      - name: extracted_at
        description: "Partition key — when the AI extraction was produced."
        data_tests: [not_null]

  - name: event_bill
    description: "AI-referenced legislation/bills (year is a calendar-year string). One row per (analysis, leg ref); partitioned by extracted_at."
    config:
      tags: ['marts', 'event-extraction', 'ai']
    columns:
      - name: extraction_key
        description: "Stable dedup key (source_event_id || '_' || leg_id)."
        data_tests: [not_null, unique]
      - name: event_bill_id
        description: "md5 surrogate of extraction_key — primary key (with extracted_at)."
        data_tests: [not_null]
      - name: analysis_id
        description: "FK -> event_meeting.event_meeting_id (the parent meeting)."
        data_tests:
          - relationships:
              arguments: {to: "ref('event_meeting')", field: event_meeting_id}
              config: {severity: warn}
      - name: c1_event_id
        description: "Resolved canonical OCD event id (nullable until the event is promoted)."
        data_tests:
          - relationships:
              arguments: {to: "source('civic_core', 'civic_event')", field: id}
              config: {severity: warn}
      - name: extracted_at
        description: "Partition key — when the AI extraction was produced."
        data_tests: [not_null]
