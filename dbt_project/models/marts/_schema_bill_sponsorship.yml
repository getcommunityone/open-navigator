version: 2

models:
  - name: bill_sponsorship
    description: >
      public.bill_sponsorship — bridge, one row per (bill, person sponsor). Built
      from int_bills__sponsor_person_linked. PK bill_sponsor_id; FK bill_uid ->
      bills.bill_uid; FK person_uid -> mdm_person.person_uid (NOT NULL — every AL
      person sponsor resolves to an OpenStates legislator now in mdm_person, 100%).
      Only person sponsors are carried (org sponsors dropped upstream). primary_party
      is the sponsor's party from the OpenStates legislator source.
    config:
      materialized: table
      on_schema_change: fail
      contract:
        enforced: true
    constraints:
      - type: foreign_key
        columns: [bill_uid]
        to: ref('bills')
        to_columns: [bill_uid]
      - type: foreign_key
        columns: [person_uid]
        to: ref('mdm_person')
        to_columns: [person_uid]
    columns:
      - name: bill_sponsor_id
        description: "Primary key. md5(bill_uid || '|' || ocd_person_id || '|' || coalesce(classification,''))."
        data_type: text
        constraints:
          - type: not_null
          - type: primary_key
        tests:
          - unique
          - not_null
      - name: bill_uid
        description: "FK -> bills.bill_uid. NOT NULL."
        data_type: text
        constraints:
          - type: not_null
        tests:
          - not_null
          - relationships:
              to: ref('bills')
              field: bill_uid
      - name: person_uid
        description: "FK -> mdm_person.person_uid (OpenStates legislator). NOT NULL."
        data_type: text
        constraints:
          - type: not_null
        tests:
          - not_null
          - relationships:
              to: ref('mdm_person')
              field: person_uid
      - name: ocd_person_id
        description: "OCD person id of the sponsor (ocd-person/..)."
        data_type: text
        constraints:
          - type: not_null
      - name: sponsor_name
        description: "Sponsor display name from the sponsorship element."
        data_type: text
      - name: is_primary
        description: "True when this sponsor is a primary sponsor of the bill."
        data_type: boolean
      - name: classification
        description: "Sponsorship classification (e.g. 'primary', 'cosponsor')."
        data_type: text
      - name: primary_party
        description: "Sponsor's primary party (from the OpenStates legislator source)."
        data_type: text
      - name: dbt_loaded_at
        description: "dbt build timestamp."
        data_type: timestamp with time zone
