version: 2

# public.browse_entity_state_transcript_count — per-(entity, STATE) count of
# distinct transcripts linked to each browseable homepage entity. The per-state
# sibling of browse_transcript_count (which collapses to a single national row).
#
# Keys (per CLAUDE.md, enforced as Postgres constraints via contract):
#   - PK: (entity_type, entity_id, state_code) — composite, one row per entity
#     per state. state_code IS part of the key here (unlike browse_transcript_count).
#   - No FK: entity_id is polymorphic (geoid | topic_id | question_id), so it
#     cannot reference a single parent table — relationships are validated
#     upstream in the bridge int_browse_entity_transcripts.

models:
  - name: browse_entity_state_transcript_count
    description: >
      public.browse_entity_state_transcript_count — per-entity-per-state count of
      DISTINCT transcript videos (public.event_documents, document_type=
      'transcript') linked to each browseable homepage entity. Lets the browse
      pages filter to a selected place's state and show only the place|topic|
      question|cause entities actually discussed there. state_code is never NULL.
      Causes now carry real per-state keyword-FTS counts (EveryOrg taxonomy via
      int_transcript_keyword_cause). Source:
      intermediate.int_browse_entity_transcripts.
    config:
      materialized: table
      on_schema_change: fail
      contract:
        enforced: true
    constraints:
      - type: primary_key
        columns: [entity_type, entity_id, state_code]
    columns:
      - name: entity_type
        description: "Entity kind: 'place' | 'topic' | 'question' | 'cause'. Part of the PK."
        data_type: text
        constraints:
          - type: not_null
        data_tests:
          - not_null
          - accepted_values:
              values: ['place', 'topic', 'question', 'cause']
      - name: entity_id
        description: >
          Polymorphic entity id (part of the PK): geoid for place, topic_id for
          topic, question_id for question.
        data_type: text
        constraints:
          - type: not_null
        data_tests:
          - not_null
      - name: state_code
        description: "2-letter state the transcripts were recorded in. Part of the PK; never NULL."
        data_type: text
        constraints:
          - type: not_null
        data_tests:
          - not_null
      - name: entity_name
        description: "Human-readable entity label (place name / topic name / question text)."
        data_type: text
      - name: transcript_count
        description: >
          COUNT(DISTINCT video_id) of transcripts linked to this entity within
          this state. Never NULL.
        data_type: integer
        constraints:
          - type: not_null
        data_tests:
          - not_null
