version: 2

models:
  - name: event
    description: >
      MDM consolidated event — the single golden-record event surface in the
      public schema. Unions CDP events with LocalView meetings (deduped by
      video_url, CDP winning collisions) into one row per real-world meeting.
      Source occurrences crosswalk back via mdm_bridge_event_source on match_key.
      Consumed by the API (api/routes/search_postgres.py) and int_events_union.
    config:
      materialized: table
      contract:
        enforced: true
    columns:
      - name: event_id
        data_type: bigint
        description: "Surrogate master event id (1:1 with match_key)."
        constraints:
          - type: not_null
          - type: primary_key
        tests:
          - unique
          - not_null
      - name: match_key
        data_type: text
        description: "Natural dedup key: video_url, else datasource_id_source. Join key for mdm_bridge_event_source."
        tests:
          - unique
      - name: event_title
        data_type: text
      - name: event_description
        data_type: text
      - name: event_date
        data_type: date
      - name: event_time
        data_type: time without time zone
      - name: event_datetime
        data_type: timestamp without time zone
      - name: body_name
        data_type: text
      - name: body_description
        data_type: text
      - name: jurisdiction_id
        data_type: text
      - name: channel_id
        data_type: text
      - name: jurisdiction_name
        data_type: text
      - name: jurisdiction_type
        data_type: text
      - name: state_code
        data_type: text
      - name: state
        data_type: text
      - name: city
        data_type: text
      - name: location
        data_type: text
      - name: location_description
        data_type: text
      - name: meeting_type
        data_type: text
      - name: status
        data_type: text
      - name: agenda_url
        data_type: text
      - name: minutes_url
        data_type: text
      - name: video_url
        data_type: text
      - name: session_content_hash
        data_type: text
      - name: view_count
        data_type: bigint
      - name: duration_minutes
        data_type: double precision
      - name: like_count
        data_type: bigint
      - name: language
        data_type: text
      - name: channel_type
        data_type: text
      - name: channel_url
        data_type: text
      - name: source
        data_type: text
      - name: datasource_id
        data_type: text
      - name: external_source_id
        data_type: text
      - name: last_updated
        data_type: timestamp with time zone

  - name: mdm_bridge_event_source
    description: >
      MDM crosswalk — one row per source event occurrence (CDP + LocalView),
      including LocalView videos that `event` drops as duplicates of a CDP row.
      PK event_source_id, FK event_id -> event.
    config:
      materialized: table
      contract:
        enforced: true
    constraints:
      - type: foreign_key
        columns: [event_id]
        to: ref('event')
        to_columns: [event_id]
    columns:
      - name: event_source_id
        data_type: text
        description: "Surrogate occurrence key = hash(source_system, source_pk)."
        constraints:
          - type: not_null
          - type: primary_key
        tests:
          - unique
          - not_null
      - name: event_id
        data_type: bigint
        description: "Master event this occurrence resolves to."
        constraints:
          - type: not_null
        tests:
          - not_null
          - relationships:
              to: ref('event')
              field: event_id
      - name: source_system
        data_type: text
        description: "'cdp' or 'localview'."
        tests:
          - accepted_values:
              values: ['cdp', 'localview']
      - name: source_pk
        data_type: text
        description: "Natural key of the source occurrence (datasource_id)."
      - name: match_key
        data_type: text
        description: "Dedup key used to resolve the master event."
      - name: video_url
        data_type: text

  - name: mdm_bridge_event_analysis
    description: >
      MDM crosswalk linking the AI-extraction family to the golden record:
      event_meeting (analysis) -> event (master). Joined on YouTube video_id
      (unique in event). One row per analysis that surfaced in the golden record;
      INNER join, so event_id is always present. Rebuilt in-run after `event` so
      its FK tracks event's volatile ROW_NUMBER() surrogate. No c1_* dependency.
    config:
      materialized: table
      contract:
        enforced: true
    constraints:
      - type: foreign_key
        columns: [event_meeting_id]
        to: ref('event_meeting')
        to_columns: [event_meeting_id]
      - type: foreign_key
        columns: [event_id]
        to: ref('event')
        to_columns: [event_id]
    columns:
      - name: event_meeting_id
        data_type: integer
        description: "Analysis id — PK here; FK -> event_meeting.event_meeting_id."
        constraints:
          - type: not_null
          - type: primary_key
        tests:
          - unique
          - not_null
          - relationships:
              to: ref('event_meeting')
              field: event_meeting_id
      - name: event_id
        data_type: bigint
        description: "Master golden-record event this analysis resolves to."
        constraints:
          - type: not_null
        tests:
          - not_null
          - relationships:
              to: ref('event')
              field: event_id
      - name: video_id
        data_type: text
        description: "YouTube video id the two families share (the join key)."

  - name: event_documents
    description: >
      public.event_documents — searchable documents attached to a golden-record
      event. One row per (event, document); today the only document_type is
      'transcript' (video transcripts from events_text_search), generalizing to
      agenda / minutes / caption documents later without a schema change.
      content holds the full searchable body (GIN full-text indexed). FK
      event_id -> event. Consumed by the API (search_documents_pg).
      Denormalized title/jurisdiction/state/city are sourced from the golden
      event when one exists, else COALESCE-backfilled from
      event_youtube_with_jurisdiction (by video_id) so the ~90% orphan
      transcripts still carry a location and survive state/city filters.
    config:
      materialized: table
      contract:
        enforced: true
    constraints:
      - type: foreign_key
        columns: [event_id]
        to: ref('event')
        to_columns: [event_id]
    columns:
      - name: event_document_id
        data_type: bigint
        description: "Surrogate document id (PK). Stable within a build only."
        constraints:
          - type: not_null
          - type: primary_key
        tests:
          - unique
          - not_null
      - name: event_id
        data_type: bigint
        description: >
          Golden-record event this document belongs to. NULLABLE: ~90% of
          transcripts have no golden event yet (un-promoted video) and are kept
          searchable with event_id NULL. FK enforced for non-null values.
        tests:
          - relationships:
              to: ref('event')
              field: event_id
      - name: document_type
        data_type: text
        description: "Kind of document. Currently always 'transcript'."
        constraints:
          - type: not_null
        tests:
          - accepted_values:
              values: ['transcript']
      - name: document_source
        data_type: text
        description: "Provenance of the document body (e.g. transcript source 'youtube')."
      - name: video_id
        data_type: text
        description: "YouTube video id the transcript was derived from."
      - name: content
        data_type: text
        description: >
          Full searchable document body (transcript text). GIN full-text indexed
          on the dev target. NULLABLE: on the `neon` serving target the full body
          is dropped (only content_excerpt is kept) to fit the free tier, so this
          is NULL there; on dev it is always populated.
      - name: content_excerpt
        data_type: text
        description: >
          Capped left(content, 300) preview of the document body. Always present
          (both targets); on `neon` it is the only retained text since `content`
          is dropped.
      - name: content_tsv
        data_type: tsvector
        description: >
          Precomputed full-text vector over content (dev target, GIN indexed). On
          the `neon` serving target this is NULL (national document FTS disabled to
          fit the free tier; search_documents_pg returns empty rather than error).
      - name: content_length
        data_type: integer
        description: "Character length of content."
      - name: word_count
        data_type: integer
        description: "Approximate word count of content."
      - name: language
        data_type: text
        description: "Document language (e.g. 'en')."
      - name: is_auto_generated
        data_type: boolean
        description: "True when the transcript was auto-generated (vs. human)."
      - name: segments
        data_type: jsonb
        description: "Timed transcript segments (JSONB), when available."
      - name: event_title
        data_type: text
        description: "Denormalized event title for result display."
      - name: event_date
        data_type: date
        description: "Denormalized event date for sort/display."
      - name: jurisdiction_name
        data_type: text
        description: "Denormalized jurisdiction name for result display."
      - name: jurisdiction_type
        data_type: text
        description: "Denormalized jurisdiction type."
      - name: state_code
        data_type: text
        description: "Denormalized 2-letter state code for filtering."
      - name: state
        data_type: text
        description: "Denormalized full state name for display."
      - name: city
        data_type: text
        description: "Denormalized city for display."
      - name: video_url
        data_type: text
        description: "Source video URL."
      - name: created_at
        data_type: timestamp without time zone
        description: "When the underlying transcript row was created."

  - name: event_document_lexicon
    description: >
      public.event_document_lexicon — distinct alphabetic lexemes present in
      transcript full-text vectors (event_documents.content_tsv), with corpus
      frequencies. One row per `word`. Backs the fuzzy "did-you-mean" fallback in
      the API (search_documents_pg): a misspelled query term is mapped to its
      nearest real lexeme via a pg_trgm GIN index on `word`, so a typo like
      "flouride" still finds "fluoride" instead of returning nothing. Filtered to
      length 4–40, alphabetic, appearing in >= 2 transcripts. Empty on the neon
      target (content_tsv is NULL there).
    columns:
      - name: word
        data_type: text
        description: "Distinct corpus lexeme (stemmed token). Trigram-indexed (GIN)."
        tests:
          - unique
          - not_null
      - name: document_count
        data_type: integer
        description: "Number of transcripts the lexeme appears in (ts_stat ndoc)."
      - name: occurrence_count
        data_type: integer
        description: "Total occurrences across all transcripts (ts_stat nentry)."
