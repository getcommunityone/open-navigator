version: 2

# public.jurisdiction_document — jurisdiction-grain civic documents (comprehensive
# plans / frameworks, zoning ordinances, ordinance codes, zoning maps). One row
# per document, owned by a JURISDICTION (not a single meeting).
#
# Keys (per CLAUDE.md, enforced as Postgres constraints via contract):
#   - PK: jurisdiction_document_id (md5 of jurisdiction_id + url_sha256).
#   - FK: jurisdiction_id -> public.jurisdictions.jurisdiction_id. jurisdictions
#     has a single-column PK, so this is a REAL enforced FK. NOT NULL: a
#     jurisdiction-grain document must belong to a real jurisdiction.

models:
  - name: jurisdiction_document
    description: >
      public.jurisdiction_document — jurisdiction-grain civic documents
      (comprehensive plan / framework, zoning ordinance, ordinance code, zoning
      map) that belong to a JURISDICTION rather than a single meeting, so the API
      can surface "plans & ordinances" on a jurisdiction view and link them to
      civic data. One row per document. DISTINCT from event_meeting_document
      (meeting-grain agenda/minutes matched on jurisdiction + date + body): a
      framework has no meeting date and links straight to the jurisdiction.
      Source: staging.stg_jurisdiction_document (bronze.bronze_jurisdiction_document,
      landed by ingestion.jurisdiction_documents.bronze from a curated registry
      of real published documents — e.g. the City of Tuscaloosa "Framework").
    config:
      materialized: table
      on_schema_change: fail
      tags: ['marts', 'documents', 'jurisdiction', 'production']
      contract:
        enforced: true
    columns:
      - name: jurisdiction_document_id
        description: "Primary key — md5(jurisdiction_id || '|' || url_sha256), stable per document."
        data_type: text
        constraints:
          - type: not_null
          - type: primary_key
        data_tests:
          - unique
          - not_null
      - name: jurisdiction_id
        description: >
          FK -> public.jurisdictions.jurisdiction_id (the owning jurisdiction).
          NOT NULL — a jurisdiction-grain document must belong to a real
          jurisdiction. Enforced FK (jurisdictions has a single-column PK).
        data_type: text
        constraints:
          - type: not_null
          - type: foreign_key
            to: ref('jurisdictions')
            to_columns: [jurisdiction_id]
        data_tests:
          - relationships:
              arguments:
                to: ref('jurisdictions')
                field: jurisdiction_id
      - name: document_type
        description: "comprehensive_plan | zoning_ordinance | ordinance_code | zoning_map."
        data_type: text
        constraints:
          - type: not_null
        data_tests:
          - accepted_values:
              arguments:
                values: ['comprehensive_plan', 'zoning_ordinance', 'ordinance_code', 'zoning_map']
      - name: title
        description: "Human-readable document title."
        data_type: text
      - name: document_url
        description: "Canonical URL of the document."
        data_type: text
        constraints:
          - type: not_null
      - name: url_sha256
        description: "SHA-256 of document_url (the per-document key part)."
        data_type: varchar(64)
        constraints:
          - type: not_null
      - name: adopted_date
        description: "Adoption date (DATE); null unless verified."
        data_type: date
      - name: source
        description: "Publishing site / origin (e.g. 'framework.tuscaloosa.com')."
        data_type: varchar(128)
      - name: ingested_at
        description: "When the document was loaded into bronze."
        data_type: timestamp
