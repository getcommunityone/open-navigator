version: 2

# public.meeting_cause_link — meeting <-> EveryOrg cause linkages (the cause
# counterpart to meeting_topic_link). One row per (event_meeting_id, cause_id),
# produced by a transcript full-text match against each cause's curated keyword
# set (int_meeting_cause).
#
# event_meeting is a plain table with a single-column PK (event_meeting_id), so
# the FK into it is a REAL enforced constraint. cause_id references the EveryOrg
# cause taxonomy (stg_everyorg__cause / bronze_everyorg_causes); that source is
# not a contract-enforced mart, so cause membership is asserted with a
# relationships test rather than a cross-table enforced FK.

models:
  - name: meeting_cause_link
    description: >
      public.meeting_cause_link — one row per (event_meeting_id, cause_id) where
      the meeting's transcript full-text-matched the cause's curated keyword set.
      Backs the per-cause meeting count on the Browse Causes pills.
    config:
      materialized: table
      on_schema_change: fail
      tags: ['marts', 'civic', 'meeting-browse', 'cause']
      contract:
        enforced: true
    columns:
      - name: meeting_cause_link_id
        description: "Primary key — md5(event_meeting_id || '|' || cause_id)."
        data_type: text
        constraints:
          - type: not_null
          - type: primary_key
        tests:
          - unique
          - not_null
      - name: event_meeting_id
        description: "FK -> event_meeting.event_meeting_id (enforced)."
        data_type: integer
        constraints:
          - type: not_null
          - type: foreign_key
            to: ref('event_meeting')
            to_columns: [event_meeting_id]
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('event_meeting')
                field: event_meeting_id
      - name: cause_id
        description: "EveryOrg cause slug (e.g. 'education', 'climate')."
        data_type: text
        constraints:
          - type: not_null
        tests:
          - not_null
      - name: cause_label
        description: "Human cause name (e.g. 'Education', 'Climate')."
        data_type: text
        constraints:
          - type: not_null
      - name: cause_icon
        description: "Cause emoji icon (passthrough from the EveryOrg taxonomy)."
        data_type: text
      - name: popularity_rank
        description: "EveryOrg popularity rank (lower = more popular); may be null."
        data_type: integer
      - name: state_code
        description: "2-letter state code (passthrough from event_meeting)."
        data_type: varchar
      - name: state
        description: "Full state name (passthrough from event_meeting)."
        data_type: text
      - name: city
        description: "City (passthrough from event_meeting)."
        data_type: varchar
      - name: jurisdiction_name
        description: "Jurisdiction name (passthrough from event_meeting)."
        data_type: varchar
      - name: meeting_date
        description: "Meeting date as stored on event_meeting (text)."
        data_type: text
      - name: video_id
        description: "Transcript/video key (passthrough from event_meeting)."
        data_type: varchar
      - name: has_transcript
        description: "True when the meeting has a transcript document."
        data_type: boolean
        constraints:
          - type: not_null
