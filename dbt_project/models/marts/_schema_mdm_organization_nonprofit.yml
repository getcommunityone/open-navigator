version: 2

models:
  - name: mdm_organization_nonprofit
    description: >
      MDM satellite: IRS/990 nonprofit detail (NTEE, financials, GivingTuesday
      990) for the subset of mdm_organization that carries an EIN. One row per
      master_org_id (1:1). PK master_org_id, FK -> mdm_organization.
    config:
      materialized: table
      on_schema_change: fail
      contract:
        enforced: true
    constraints:
      - type: foreign_key
        columns: [master_org_id]
        to: ref('mdm_organization')
        to_columns: [master_org_id]
    columns:
      - name: master_org_id
        description: "Primary key — golden org id, FK to mdm_organization.master_org_id (1:1 with the EIN-carrying subset)."
        data_type: text
        constraints:
          - type: not_null
          - type: primary_key
        tests:
          - unique
          - not_null
          - relationships:
              to: ref('mdm_organization')
              field: master_org_id
              config:
                where: "master_org_id is not null"
      - name: ein
        description: "Employer Identification Number (nonprofit natural key)."
        data_type: text
        constraints:
          - type: not_null
      - name: ntee_code
        description: "Full NTEE classification code (e.g. 'E20')."
        data_type: text
      - name: ntee_description
        description: "NTEE major-group (first letter of ntee_code) description, inlined here for serving parity; the canonical hierarchical taxonomy is the `tag` mart."
        data_type: text
      - name: subsection_code
        description: "IRS 501(c) subsection code (from int_nonprofits_combined.subsection)."
        data_type: text
      - name: classification_code
        description: "IRS classification code (from int_nonprofits_combined.classification; distinct from OCD classification)."
        data_type: text
      - name: revenue
        description: "IRS BMF revenue figure (registry proxy)."
        data_type: bigint
      - name: assets
        description: "IRS BMF assets figure (registry proxy)."
        data_type: bigint
      - name: income
        description: "IRS BMF income figure (registry proxy)."
        data_type: bigint
      - name: tax_period
        description: "IRS BMF tax period (YYYYMM)."
        data_type: text
      - name: ruling_date
        description: "IRS ruling date (tax-exempt status grant)."
        data_type: text
      - name: foundation_code
        description: "IRS foundation type code."
        data_type: text
      - name: gt990_tax_year
        description: "GivingTuesday curated-990 datamart tax year (the e-filed return year). Integer calendar year."
        data_type: integer
      - name: gt990_total_revenue
        description: "Real e-filed 990 total revenue (GivingTuesday datamart)."
        data_type: bigint
      - name: gt990_total_expenses
        description: "Real e-filed 990 total expenses (GivingTuesday datamart)."
        data_type: bigint
      - name: gt990_total_assets
        description: "Real e-filed 990 end-of-year total assets (GivingTuesday datamart)."
        data_type: bigint
      - name: gt990_total_liabilities
        description: "Real e-filed 990 end-of-year total liabilities (GivingTuesday datamart)."
        data_type: bigint
      - name: gt990_net_assets
        description: "Real e-filed 990 net assets / fund balances (GivingTuesday datamart)."
        data_type: bigint
      - name: gt990_total_contributions
        description: "Real e-filed 990 total contributions, gifts & grants received (GivingTuesday datamart)."
        data_type: bigint
      - name: gt990_program_service_revenue
        description: "Real e-filed 990 program service revenue (GivingTuesday datamart)."
        data_type: bigint
      - name: gt990_source_url
        description: "URL of the source 990 filing/datamart record backing the gt990_* figures."
        data_type: text
      - name: gt990_mission
        description: "990-filed mission statement (GivingTuesday datamart)."
        data_type: text
      - name: has_gt990_data
        description: "True when a real 990 (financials or mission) was matched."
        data_type: boolean
      - name: source
        description: "Upstream datasource label (irs / nccs / ...)."
        data_type: text
      - name: dbt_loaded_at
        description: "dbt build timestamp."
        data_type: timestamp with time zone
