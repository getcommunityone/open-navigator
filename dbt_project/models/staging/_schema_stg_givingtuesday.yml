version: 2

models:
  - name: stg_givingtuesday__990_financials
    description: >
      Staging view over bronze.bronze_organizations_990_financials (GivingTuesday
      990CN120Fields datamart). One row per (ein, tax_year) filing; light cleaning
      and type stabilization only. The latest-filing-per-EIN collapse happens in
      int_nonprofits_combined.
    columns:
      - name: ein
        description: "9-digit EIN (joins to IRS/NCCS)"
        tests:
          - not_null
      - name: tax_year
        description: "Filing tax year"
      - name: total_revenue
        description: "Form 990 Part 1 Line 12 - Total Revenue Current Year (USD)"
      - name: total_expenses
        description: "Form 990 Part 1 Line 18 - Total Expenses Current Year (USD)"

  - name: stg_givingtuesday__990_missions
    description: >
      Staging view over bronze.bronze_organizations_990_missions (GivingTuesday
      990Part1Missions datamart). One row per (ein, tax_year) with a non-null
      mission statement. Latest filing per EIN selected in int_nonprofits_combined.
    columns:
      - name: ein
        description: "9-digit EIN (joins to IRS/NCCS)"
        tests:
          - not_null
      - name: mission
        description: "Form 990 Part 1 Line 1 - Mission & Most Significant Activities"
        tests:
          - not_null

  - name: stg_grants_gt990__schedule_i
    description: >
      Staging view over bronze.bronze_grants_gt990_schedule_i (GivingTuesday
      990 Schedule I Part II grants datamart). One row per grant line
      (grantor -> grantee org). Light cleaning + type stabilization: EIN
      normalization, tax_year cast to integer, state uppercased. Grantor ->
      org-master resolution and the surrogate grant_id are applied in the
      `grant` mart.
    columns:
      - name: grantor_ein
        description: "9-digit EIN of the filing (grantor) organization."
        tests:
          - not_null
      - name: grantee_name
        description: "Recipient organization name."
        tests:
          - not_null
      - name: tax_year
        description: "Filing tax year (integer)."
      - name: cash_grant_amount
        description: "Amount of cash grant (USD)."
