          regex parsing, state-code + OCD resolution, and the election-year
          filter — are derived downstream (stg_ballotpedia__measure +
          int_ballotpedia__measure_resolved), NOT in Python.
          Loaded by ingestion.ballotpedia.measures.

          HUMAN TODO (schema drift): models/bronze/bronze_ballot_measures_nist.sql
          still reads the OLD flat NIST columns (ocd_division_id, measure_title,
          election_date, yes_votes, scraped_at, ...) straight off this source —
          those columns no longer exist here. Repoint that model's
          `ballotpedia_measures` CTE at int_ballotpedia__measure_resolved (which
          now provides ocd_division_id, measure_title, election_date, votes,
          passed, etc.); `scraped_at` becomes source_ingested_at / loaded_at.
          Until then `dbt build` of bronze_ballot_measures_nist will fail.
        columns:
          - name: measure_id
            description: "Stable source record id (ocd-ballotmeasure/UUID or explicit). Natural key."
          - name: scrape_batch_id
            description: "UUID per loader run."
          - name: raw_row
            description: "Full raw Ballotpedia measure JSON object merged with the snapshot envelope (JSONB). Source of all derived columns."
