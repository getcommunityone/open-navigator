version: 2

sources:
  - name: bronze
    description: "Bronze tables from AI extraction and raw data ingestion - ALL IN BRONZE SCHEMA"
    database: open_navigator  # Single database with schemas
    schema: bronze  # Bronze schema for raw data
    tables:
      - name: bronze_ntee_codes
        description: |
          Raw NTEE classification codes — one row per `code`. Landed by
          ingestion.ntee.codes from IRS Pub 557 + NCCS taxonomy. The hierarchical
          `cause_breadcrumb` is derived downstream in int_ntee__breadcrumb via a
          recursive CTE over `parent_code`.
        columns:
          - name: code
            description: "NTEE code — primary key / natural key."
          - name: name
            description: "Human-readable code name (falls back to code if no description)."
          - name: description
            description: "Code description (may be null)."
          - name: cause_type
            description: "Always 'ntee' for this source."
          - name: parent_code
            description: "Parent NTEE code (null at the taxonomy root)."
          - name: category
            description: "NTEE type/category label (e.g. 'major', 'division')."
          - name: subcategory
            description: "Reserved; currently always null."
          - name: code_source
            description: "Provenance tag (e.g. 'irs')."
          - name: ingestion_date
            description: "When the row was upserted."

      - name: bronze_everyorg_causes
        description: |
          EveryOrg curated cause taxonomy — one row per `cause_id`. Landed by
          ingestion.everyorg.causes from a vendored YAML (or operator-supplied
          CSV/parquet in data/cache/everyorg/). Every.org does not expose a
          list-causes API, so the YAML is the canonical source.
        columns:
          - name: cause_id
            description: "EveryOrg cause slug — primary key (e.g. 'animals', 'climate')."
          - name: cause_name
            description: "Display name."
          - name: description
            description: "Short description (may be null)."
          - name: icon
            description: "Emoji icon for the cause (may be null)."
          - name: category
            description: "Coarse grouping (e.g. 'health', 'environment')."
          - name: parent_id
            description: "Parent cause_id for hierarchical causes (may be null)."
          - name: popularity_rank
            description: "Manually-curated popularity ordering (lower = more popular)."
          - name: ingestion_date
            description: "When the row was upserted."

      - name: bronze_organizations_nonprofits_nccs_history
        description: "NCCS Unified BMF organization-years (raw history), landed by ingestion.nccs.bulk. One row per (ein, org_year_last)."
      - name: bronze_locations
        description: |
          HIFLD infrastructure locations (RAW), landed by ingestion.hifld.locations.
          One row per (source_dataset, source_id). Source column-name normalization
          (FIELD_MAP) and organization_type classification were moved out of Python
          into stg_hifld__location; the original record is preserved in raw_record JSONB.
        columns:
          - name: source_id
            description: "Best-effort source record id (FID/ID/OBJECTID/FACILITY_ID). Natural-key component."
          - name: source_dataset
            description: "Originating HIFLD parquet stem (e.g. Hospitals, Fire_Stations). Drives organization_type."
          - name: data_source
            description: "Constant 'HIFLD'."
          - name: raw_record
            description: "JSONB of every source column, verbatim (un-normalized HIFLD field names)."
          - name: loaded_at
            description: "When the row was landed."
      - name: bronze_contacts
        description: "People extracted from meeting transcripts via AI"
        columns:
          - name: id
            description: "Primary key"
          - name: source_event_id
            description: "Foreign key to bronze_events_localview"
          - name: source_ai_model
            description: "AI model used (e.g., gemini-1.5-flash)"
          - name: person_id
            description: "Wikidata QID or OpenStates person ID if matched"
          - name: full_name
            description: "Person's full name"
          - name: role
            description: "Role/title (e.g., Mayor, Council Member)"
          - name: org_id
            description: "Organization identifier"
          - name: wikidata_qid
            description: "Wikidata entity ID (if matched)"
          - name: extracted_at
            description: "Timestamp of extraction"
            
      - name: bronze_organizations_meetings
        description: "Organizations mentioned in meetings (deduplicated by org_id)"
        columns:
          - name: id
          - name: source_event_id
          - name: org_id
          - name: org_name
          - name: ein
          - name: ntee_code
          - name: extracted_at
          - name: last_seen_event_id
            description: "Most recent meeting where this org appeared"
          - name: first_seen_event_id
            description: "First meeting where this org appeared"
          
      - name: bronze_bills
        description: "Legislation discussed in meetings"
        columns:
          - name: id
          - name: source_event_id
          - name: leg_id
          - name: official_number
          - name: title
          - name: jurisdiction
          - name: year
          - name: extracted_at
          
      - name: bronze_decisions
        description: "Policy decisions from meeting analysis"
        columns:
          - name: id
          - name: source_event_id
          - name: decision_id
          - name: headline
          - name: decision_statement
          - name: outcome
          - name: extracted_at
          
      - name: bronze_topics
        description: "Topics extracted from meeting transcripts and agendas"
        columns:
          - name: id
          - name: topic_id
          - name: topic_name
          - name: category
          
      - name: bronze_causes
        description: "Policy causes and advocacy categories"
        columns:
          - name: id
          - name: cause_id
          - name: cause_name
          - name: description
          
      - name: bronze_events_localview
        description: "Meeting events with jurisdiction data (primarily from LocalView and YouTube)"
        columns:
          - name: id
          - name: event_id
            description: "Original event ID from event"
          - name: event_date
          - name: jurisdiction_name
          - name: jurisdiction_type
          - name: city
          - name: state_code
          - name: state
          - name: meeting_type
          - name: loaded_at
      
      - name: bronze_events_youtube
        description: |
          Raw YouTube video data from government channels. Landed by the LAND
          loader ingestion.youtube.events (pre-collected JSON/JSONL out of
          data/cache/youtube/, emitted by the FETCH scraper
          packages/scrapers/src/scrapers/youtube/load_youtube_events_to_postgres.py). The
          loader lands records VERBATIM with NO derivation: event_date /
          event_time are NULL here — the meeting date is DERIVED from the title
          downstream in stg_youtube__event, along with channel_type
          classification and per-video dedup. event_id is a stable SHA-derived
          integer (not Python hash()).
        columns:
          - name: id
          - name: event_id
            description: "Generated from video_id hash"
          - name: video_id
            description: "YouTube video ID (e.g., 'dQw4w9WgXcQ')"
          - name: event_date
          - name: event_time
          - name: title
          - name: description
          - name: jurisdiction_id
          - name: jurisdiction_name
          - name: jurisdiction_type
          - name: city
          - name: state_code
          - name: state
          - name: meeting_type
          - name: location
          - name: location_description
          - name: channel_id
          - name: channel_url
          - name: channel_type
          - name: video_url
          - name: view_count
          - name: duration_minutes
          - name: like_count
          - name: language
          - name: datasource
          - name: datasource_id
          - name: published_at
            description: "When YouTube published the video"
          - name: loaded_at
          - name: last_updated
      
      - name: bronze_events_channels
        description: "YouTube channels from government jurisdictions - validated and enriched"
        columns:
          - name: id
            description: "Primary key"
          - name: channel_id
            description: "YouTube channel ID (unique)"
          - name: channel_url
            description: "Full YouTube channel URL"
          - name: channel_title
            description: "Channel display name"
          - name: channel_description
            description: >
              Channel About description from public /about HTML (when scraped by
              packages/scrapers/src/scrapers/youtube/channel_about_links.py).
          - name: channel_external_links
            description: >
              JSON array of outbound links: About-tab featured links plus http(s)/www URLs
              scraped from the channel description (see channel_about_links.py).
          - name: channel_external_links_fetched_at
            description: "When channel_external_links was last scraped from YouTube About"
          - name: channel_type
            description: "Type: municipal, county, state, school, unknown"
          - name: subscriber_count
            description: "Number of subscribers"
          - name: video_count
            description: "Number of videos on the channel"
          - name: view_count
            description: >
              Total lifetime channel views from public /about HTML when scraped by
              channel_about_links.py (from viewCountText); NULL if hidden or unparseable.
          - name: in_localview
            description: "TRUE if channel has videos in LocalView dataset"
          - name: in_jurisdictions_details
            description: "TRUE if found in jurisdictions_details_search"
          - name: on_public_website
            description: "TRUE if found on official government website"
          - name: in_wikidata
            description: "TRUE if verified via WikiData"
          - name: discovery_method
            description: "How channel was discovered (e.g., jurisdictions_details, wikidata)"
          - name: discovery_date
            description: "When channel was first discovered"
          - name: confidence_score
            description: "Confidence score from discovery method (0-1)"
          - name: jurisdictions
            description: "JSONB array of associated jurisdictions"
          - name: is_verified
            description: "TRUE if channel is verified by YouTube"
          - name: is_government
            description: "TRUE/FALSE/NULL - government channel classification"
          - name: flagged_as_junk
            description: "TRUE if flagged as non-government (news, entertainment, etc.)"
          - name: flag_reason
            description: "Reason for junk flag if applicable"
          - name: loaded_at
            description: "When record was first created"
          - name: last_updated
            description: "When record was last updated"
          
      - name: bronze_financial_items
        description: "Financial items from meeting discussions"
        columns:
          - name: id
          - name: source_event_id
          - name: financial_item_id
          - name: amount
          - name: item_description
          - name: extracted_at
          
      - name: bronze_organizations_nonprofits
        description: "Consolidated nonprofit organization data from multiple sources"
        columns:
          - name: ein
            description: "Employer Identification Number (primary key)"
          - name: irs_id
          - name: org_name
          - name: city
          - name: state_code
          - name: zip_code
          - name: ntee_cd
            description: "NTEE classification code"
          - name: irs_asset_amt
          - name: irs_income_amt
          - name: irs_revenue_amt
          
      - name: bronze_organizations_nonprofits_irs
        description: "IRS Business Master File (BMF) nonprofit data - 1.95M organizations"
        columns:
          - name: id
          - name: ein
            description: "Employer Identification Number (primary key)"
          - name: name
          - name: city
          - name: state_code
          - name: ntee_cd
            description: "NTEE classification code"
          - name: asset_amt
          - name: income_amt
          - name: revenue_amt
          
      - name: bronze_organizations_nonprofits_nccs
        description: "NCCS Core nonprofit data - 1.8M organizations with geographic enrichment"
        columns:
          - name: id
          - name: ein
            description: "Employer Identification Number (joins to IRS)"
          - name: ntee_nccs
            description: "NCCS NTEE classification"
          - name: nteev2
            description: "NTEE version 2"
          - name: latitude
          - name: longitude
          - name: census_cbsa_name
            description: "Census Core Based Statistical Area"
          - name: f990_total_revenue_recent
          - name: f990_total_assets_recent
      
      - name: bronze_jurisdictions
        description: "Master list of jurisdictions (cities, counties, states)"
        columns:
          - name: jurisdiction_id
            description: "Primary key"
          - name: jurisdiction_name
          - name: jurisdiction_type
          - name: state_code
          - name: county_fips
          - name: website_url

      - name: bronze_jurisdictions_states
        description: |
          Census Gazetteer US state/DC/PR rows — required base data before `load_jurisdictions_wikidata.py` can seed `bronze_jurisdictions_states_wikidata`.
          Feeds ``int_jurisdictions`` (``jurisdiction_type = state``) and GSA state-portal matching.
          Loaded by scripts/datasources/census/load_census_gazetteer.py (see scripts/load_bronze.py).
        columns:
          - name: geoid
            description: "2-digit state GEOID — primary key"
          - name: usps
            description: "2-letter state abbreviation"
          - name: ansicode
            description: "8-digit ANSI code"
          - name: name
            description: "State or equivalent name"
          - name: aland_sqmi
            description: "Land area in square miles"
          - name: awater_sqmi
            description: "Water area in square miles"
          - name: intptlat
            description: "Internal point latitude"
          - name: intptlong
            description: "Internal point longitude"
          - name: ingestion_date
            description: "When record was loaded"

      - name: bronze_jurisdictions_counties
        description: "Census Gazetteer county-level jurisdictions (3,233 US counties)"
        columns:
          - name: geoid
            description: "5-digit county GEOID (state_fips + county_fips) — primary key"
          - name: usps
            description: "2-letter state abbreviation"
          - name: ansicode
            description: "8-digit ANSI code"
          - name: name
            description: "County name"
          - name: aland_sqmi
            description: "Land area in square miles"
          - name: awater_sqmi
            description: "Water area in square miles"
          - name: intptlat
            description: "Internal point latitude"
          - name: intptlong
            description: "Internal point longitude"
          - name: ingestion_date
            description: "When record was loaded"

      - name: bronze_jurisdictions_counties_naco
        description: |
          NACo County Explorer county enrichment — RAW landing (dbt-slimmed).
          One row per (state_code, county_name); the full NACo county JSON object
          lands in raw_json. All enrichment columns (naco_id, fips_code, website,
          county_seat, population, area_sq_miles, phone, email) are derived
          downstream in stg_naco__county from raw_json, not in Python.
          Loaded by ingestion.naco.counties.
        columns:
          - name: state_code
            description: "2-letter state code. Natural-key component."
          - name: county_name
            description: "County name. Natural-key component."
          - name: raw_json
            description: "Full raw NACo county JSON object (JSONB). Source of all derived columns."
          - name: ingestion_date
            description: "When the row was landed/last updated."

      - name: bronze_jurisdictions_officials_naco
        description: "NACo county officials (when scrape collects them). Companion to bronze_jurisdictions_counties_naco."
        columns:
          - name: state_code
          - name: county_name
          - name: fips_code
          - name: official_name
          - name: raw_json

      - name: bronze_jurisdictions_municipalities
        description: "Census Gazetteer place-level jurisdictions (cities, towns, villages, boroughs, CDPs)"
        columns:
          - name: geoid
            description: "7-digit place GEOID (state_fips + place_fips) — primary key"
          - name: usps
            description: "2-letter state abbreviation"
          - name: ansicode
            description: "8-digit ANSI code"
          - name: name
            description: "Place name"
          - name: lsad
            description: "Legal/Statistical Area Description code (25=city, 43=town, 57=village, 05=borough, 37=CDP, etc.)"
          - name: funcstat
            description: "Functional status (A=active, B=active/legal, C=consolidated, etc.)"
          - name: aland_sqmi
            description: "Land area in square miles"
          - name: awater_sqmi
            description: "Water area in square miles"
          - name: intptlat
            description: "Internal point latitude"
          - name: intptlong
            description: "Internal point longitude"
          - name: ingestion_date
            description: "When record was loaded"

      - name: bronze_jurisdictions_municipalities_uscm
        description: |
          US Conference of Mayors « Meet the Mayors » directory (cities 30k+). Loaded via
          scripts/datasources/uscm/load_uscm_mayors_to_bronze.py after download_uscm_mayors.py.
          (Older installs: migrations/016_rename_bronze_jurisdictions_municipalities_uscm.sql.)
        columns:
          - name: state_code
          - name: municipality_name
          - name: mayor_name
          - name: population
          - name: mayor_photo_url
          - name: city_website
          - name: bio_url
          - name: next_election_raw
          - name: phone
          - name: email
          - name: search_term_used
          - name: source_url
          - name: scraped_at
          - name: raw_json
          - name: ingestion_date

      - name: bronze_jurisdictions_municipalities_league
        description: |
          State municipal league / League-style city directories from data/cache/leagueofcities/*/cities.json.
          Loaded via scripts/datasources/leagueofcities/load_league_city_directories_to_bronze.py
          (after download_league_city_directories.py). Feeds int_jurisdiction_websites with website_source = league.
        columns:
          - name: row_key
          - name: state_code
          - name: state
          - name: league_organization
          - name: league_base_url
          - name: municipality_name
          - name: website
          - name: jurisdiction_id
          - name: census_geoid
          - name: jurisdiction_match_method
          - name: ingestion_date

      - name: bronze_jurisdictions_school_districts_nces_directory
        description: |
          NCES CCD LEA directory row per district. Loaded via
          scripts/datasources/nces/load_nces_school_districts_to_bronze.py (CSV cache from download_nces.py).
        columns:
          - name: nces_id
          - name: district_name
          - name: state_code
          - name: state_fips
          - name: street_address
          - name: city
          - name: zip
          - name: phone
          - name: website
          - name: district_type
          - name: num_schools
          - name: school_year
          - name: raw_json
          - name: ingestion_date

      - name: bronze_jurisdictions_school_districts_nces_membership
        description: |
          NCES CCD membership totals per LEA (aggregated student counts). Same loader as directory.
        columns:
          - name: nces_id
          - name: state_code
          - name: state_fips
          - name: total_students
          - name: school_year
          - name: ingestion_date

      - name: bronze_jurisdictions_school_districts_nces_staff
        description: |
          NCES CCD staff counts per LEA and category (long format). Same loader as directory.
        columns:
          - name: nces_id
          - name: state_code
          - name: state_fips
          - name: staff_category
          - name: staff_count
          - name: school_year
          - name: ingestion_date

      - name: bronze_jurisdictions_openstates
        description: |
          Snapshot of Open States ``opencivicdata_jurisdiction``. Loaded via
          scripts/datasources/openstates/map_openstates_jurisdiction_ids.py (migration 014). Used by
          ``int_jurisdictions`` to attach ``open_states_jurisdiction_id``.
        columns:
          - name: id
            description: "OCD jurisdiction id string (primary key), e.g. ocd-jurisdiction/country:us/state:ma/government"
          - name: name
          - name: url
          - name: classification
          - name: division_id
            description: "OCD division id (links to geography; GEOID-aligned numeric segments mapped in int_jurisdictions)"
          - name: latest_bill_update
          - name: latest_people_update
          - name: created_at
          - name: updated_at
          - name: extras
          - name: loaded_at
            description: "When this row was copied into bronze"

      - name: bronze_jurisdictions_school_districts
        description: "Census Gazetteer unified school districts"
        columns:
          - name: geoid
            description: "7-digit school district GEOID (state_fips + district_code) — primary key"
          - name: usps
            description: "2-letter state abbreviation"
          - name: name
            description: "School district name"
          - name: lograde
            description: "Lowest grade served"
          - name: higrade
            description: "Highest grade served"
          - name: aland_sqmi
            description: "Land area in square miles"
          - name: awater_sqmi
            description: "Water area in square miles"
          - name: intptlat
            description: "Internal point latitude"
          - name: intptlong
            description: "Internal point longitude"
          - name: ingestion_date
            description: "When record was loaded"

      - name: bronze_jurisdictions_states_wikidata
        description: |
          US state rows from Census `bronze_jurisdictions_states` plus Wikidata (QID, official site, social, YouTube, etc.).
          Populated by packages/scrapers/src/scrapers/wikidata/load_jurisdictions_wikidata.py (not legacy public.jurisdictions_wikidata).
        columns:
          - name: geoid
            description: "State GEOID — primary key"
          - name: usps
            description: "2-letter state abbreviation"
          - name: wikidata_id
            description: "Wikidata Q-item id for the state (when resolved)"
          - name: wikidata_fetched_at
            description: "When Wikidata fields were last fetched"

      - name: bronze_jurisdictions_counties_wikidata
        description: |
          County rows aligned to `bronze_jurisdictions_counties` plus Wikidata enrichment.
          Loaded by packages/scrapers/src/scrapers/wikidata/load_jurisdictions_wikidata.py.
        columns:
          - name: geoid
            description: "5-digit county GEOID — primary key"
          - name: usps
            description: "2-letter state abbreviation"
          - name: wikidata_id
            description: "Wikidata Q-item id (when resolved)"
          - name: wikidata_fetched_at
            description: "When Wikidata fields were last fetched"

      - name: bronze_jurisdictions_municipalities_wikidata
        description: |
          Place/municipality rows aligned to `bronze_jurisdictions_municipalities` plus Wikidata enrichment.
          Loaded by packages/scrapers/src/scrapers/wikidata/load_jurisdictions_wikidata.py.
        columns:
          - name: geoid
            description: "7-digit place GEOID — primary key"
          - name: usps
            description: "2-letter state abbreviation"
          - name: wikidata_id
            description: "Wikidata Q-item id (when resolved)"
          - name: wikidata_fetched_at
            description: "When Wikidata fields were last fetched"
          - name: wikidata_last_updated
            description: "When any Wikidata enrichment column was last updated"
          - name: official_website_updated_at
            description: "When official_website (P856) was last set or changed from Wikidata"

      - name: bronze_jurisdictions_school_districts_wikidata
        description: |
          School district rows aligned to `bronze_jurisdictions_school_districts` plus Wikidata enrichment.
          Loaded by packages/scrapers/src/scrapers/wikidata/load_jurisdictions_wikidata.py.
        columns:
          - name: geoid
            description: "7-digit school district GEOID — primary key"
          - name: usps
            description: "2-letter state abbreviation"
          - name: wikidata_id
            description: "Wikidata Q-item id (when resolved)"
          - name: wikidata_fetched_at
            description: "When Wikidata fields were last fetched"

      - name: bronze_jurisdiction_wikidata_enrichment
        description: |
          Wikidata enrichment rows fetched by ingestion.wikidata.download (the
          FETCH layer that replaced the WDQS/wbgetentities HTTP path of the
          archived load_jurisdictions_wikidata.py). One row per
          (state_code, jurisdiction_type, wikidata_id). Carries the Wikidata
          join identifiers (fips_code, fips_alt, gnis_id, nces_id) and the
          enrichment payload (official_website, social, population, etc.). Read
          by stg_wikidata__enrichment and reconciled to the seeded *_wikidata
          GEOID in int_wikidata__jurisdictions_enriched.

          NEEDS-HUMAN (loader): ingestion.wikidata.download writes this data to
          data/cache/wikidata/<usps>/wikidata_enrichment_<type>.json. A small
          bronze loader (cache JSON -> this table, analogous to
          ingestion.gsa.domains landing the GSA CSV) still has to be written so
          dbt has a relation to read. Until that loader lands AND a row exists,
          `dbt build` of stg_wikidata__enrichment / int_wikidata__jurisdictions_enriched
          will fail with "relation does not exist". The seed-only staging models
          (stg_wikidata__jurisdiction_*) build independently of this source.
        columns:
          - name: wikidata_id
            description: "Wikidata Q-item id. Natural-key component."
          - name: state_code
            description: "2-letter USPS code. Natural-key component."
          - name: jurisdiction_type
            description: "county | city | school_district. Natural-key component."
          - name: item_label
            description: "English Wikidata label of the item."
          - name: fips_code
            description: "P774/P882 FIPS identifier (digits only)."
          - name: fips_alt
            description: "P3006 alternate FIPS identifier (digits only)."
          - name: gnis_id
            description: "P590 GNIS feature id (digits only); matches Census ansicode for places."
          - name: nces_id
            description: "P6545 NCES district id (digits only)."
          - name: official_website
            description: "P856 official website URL."
          - name: official_image_url
            description: "P18 image (Commons FilePath URL)."
          - name: page_banner_image
            description: "P948 page banner image."
          - name: locator_map_image
            description: "P242 locator map image."
          - name: youtube_channel_id
            description: "P2397 YouTube channel id."
          - name: facebook_username
            description: "P2013 Facebook username."
          - name: twitter_username
            description: "P2002 Twitter/X username."
          - name: population
            description: "P1082 population."
