version: 2

models:
  - name: stg_youtube__event
    description: |
      YouTube meeting-video events — one row per video_id.

      1:1-ish with bronze.bronze_events_youtube (raw landing from
      ingestion.youtube.events), collapsed to one row per video_id. This is the
      DERIVE layer of the YouTube decomposition: it reproduces, in SQL, the
      transforms the Python scraper/loader used to do inline —
        * event_date parsed from the meeting title (else published_at::date),
        * channel_type keyword classification (city/county/state/school),
        * dedup to one row per video_id (keep most recently loaded).
      The LAND loader does none of this; it lands raw records verbatim.

      Contract enforced: column data_types are pinned at the database level, so
      upstream Python schema drift fails this build before any mart sees it.

    config:
      contract:
        enforced: true
      materialized: view

    columns:
      - name: video_id
        description: "YouTube video ID. Natural key (one row per video)."
        data_type: varchar(20)
        constraints:
          - type: not_null
        tests:
          - unique
          - not_null

      - name: event_id
        description: "Stable SHA-derived integer id from the LAND loader (legacy compat)."
        data_type: integer

      - name: title
        description: "Raw video/meeting title (trimmed)."
        data_type: text

      - name: description
        description: "Raw video description (trimmed)."
        data_type: text

      - name: event_date
        description: "Meeting date DERIVED from the title, else the upload day."
        data_type: date

      - name: published_at
        description: "When YouTube published the video (raw upload timestamp)."
        data_type: timestamp

      - name: jurisdiction_id
        description: "Jurisdiction id as landed (resolution happens downstream)."
        data_type: varchar(50)

      - name: jurisdiction_name
        description: "Jurisdiction display name (trimmed)."
        data_type: varchar(500)

      - name: jurisdiction_type
        description: "Jurisdiction type as landed."
        data_type: varchar(100)

      - name: state_code
        description: "2-letter state code, uppercased + trimmed."
        data_type: varchar(2)
        tests:
          - dbt_expectations.expect_column_value_lengths_to_equal:
              value: 2
              row_condition: "state_code is not null"

      - name: state
        description: "State (full name or code as landed)."
        data_type: varchar(100)

      - name: city
        description: "City (trimmed)."
        data_type: varchar(255)

      - name: channel_id
        description: "YouTube channel id (trimmed)."
        data_type: varchar(50)

      - name: channel_url
        description: "YouTube channel URL (trimmed)."
        data_type: text

      - name: channel_type
        description: "DERIVED classification: municipal / county / state / school / unknown."
        data_type: text
        tests:
          - accepted_values:
              values: ['municipal', 'county', 'state', 'school', 'unknown']

      - name: meeting_type
        description: "Meeting type label as landed."
        data_type: varchar(255)

      - name: video_url
        description: "Canonical watch URL."
        data_type: text

      - name: location_description
        description: "Free-text location from the source video."
        data_type: text

      - name: view_count
        description: "YouTube view count at load time."
        data_type: integer

      - name: duration_minutes
        description: "Video duration in minutes."
        data_type: integer

      - name: like_count
        description: "YouTube like count at load time."
        data_type: integer

      - name: language
        description: "Caption/video language (defaults to 'en')."
        data_type: varchar(10)

      - name: datasource
        description: "Always 'youtube'."
        data_type: varchar(100)

      - name: datasource_id
        description: "Original source id (the YouTube video id)."
        data_type: varchar(255)

      - name: source_ingested_at
        description: "last_updated/loaded_at from the bronze landing table."
        data_type: timestamp

      - name: dbt_loaded_at
        description: "When this staging model was materialized."
        # current_timestamp returns timestamptz in Postgres; contract must match.
        data_type: timestamp with time zone
        constraints:
          - type: not_null
