version: 2

models:
  - name: int_trending_causes_by_jurisdiction
    description: |
      Aggregates trending causes by jurisdiction based on decisions in the last 90 days.
      Ranks causes by decision count and recency. Used to populate trending_causes JSON.
    columns:
      - name: state_code
        description: "Two-letter state code"
        tests:
          - not_null
      - name: state
        description: "Full state name"
      - name: jurisdiction_name
        description: "Name of jurisdiction (city/county/township)"
        tests:
          - not_null
      - name: jurisdiction_type
        description: "Type of jurisdiction (city, county, township)"
      - name: cause_category
        description: "Cause category (NTEE major group or primary theme)"
        tests:
          - not_null
      - name: cause_code
        description: "Cause code (NTEE code or COFOG code)"
      - name: decision_count
        description: "Number of decisions related to this cause in last 90 days"
        tests:
          - not_null
      - name: unique_topics
        description: "Number of unique topics under this cause"
      - name: most_recent_decision
        description: "Date of most recent decision for this cause"
      - name: avg_days_old
        description: "Average age (in days) of decisions for this cause"
      - name: sample_headlines
        description: "Array of up to 3 recent decision headlines"
      - name: cause_rank
        description: "Rank of this cause within the jurisdiction (1-10)"
        tests:
          - not_null
  
  - name: int_contacts_deduped
    description: "Deduplicated bronze contacts (one record per person per org)"
    columns:
      - name: bronze_contact_id
        description: "Original bronze table ID"
        tests:
          - unique
          - not_null
      - name: full_name_normalized
        description: "Normalized name for matching"
        tests:
          - not_null
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - full_name_normalized
            - org_id
  
  - name: int_nonprofits_irs_with_zcta
    description: |
      IRS nonprofits enriched with 5-digit ZCTA (ZIP Code Tabulation Area).
      ZCTAs are Census geographic approximations of ZIP codes that provide
      statistical boundaries for geographic analysis. Includes ZCTA centroid
      coordinates and land/water area.
    columns:
      - name: ein
        description: "Employer Identification Number (primary key)"
        tests:
          - unique
          - not_null
      - name: zip_code
        description: "Original ZIP code (may include ZIP+4)"
      - name: zip_code_5
        description: "Normalized 5-digit ZIP code"
      - name: zcta_5
        description: "Census 5-digit ZIP Code Tabulation Area"
      - name: zcta_latitude
        description: "Latitude of ZCTA centroid"
      - name: zcta_longitude
        description: "Longitude of ZCTA centroid"
      - name: zcta_land_area_sqmi
        description: "ZCTA land area in square miles"
      - name: zcta_water_area_sqmi
        description: "ZCTA water area in square miles"
      - name: has_zcta_match
        description: "True if ZIP code matched to a ZCTA (expect ~95%)"
        tests:
          - not_null
  
  - name: int_nonprofits_nccs_with_zcta
    description: |
      NCCS nonprofits enriched with 5-digit ZCTA (ZIP Code Tabulation Area).
      ZCTAs are Census geographic approximations of ZIP codes that provide
      statistical boundaries for geographic analysis. Includes ZCTA centroid
      coordinates as fallback for organizations without geocoding.
    columns:
      - name: ein
        description: "Employer Identification Number (primary key)"
        tests:
          - unique
          - not_null
      - name: f990_org_addr_zip
        description: "Original ZIP code from 990 filing (may include ZIP+4)"
      - name: zip_code_5
        description: "Normalized 5-digit ZIP code"
      - name: zcta_5
        description: "Census 5-digit ZIP Code Tabulation Area"
      - name: latitude
        description: "NCCS geocoded latitude (from address geocoding)"
      - name: longitude
        description: "NCCS geocoded longitude (from address geocoding)"
      - name: zcta_latitude
        description: "Latitude of ZCTA centroid (fallback)"
      - name: zcta_longitude
        description: "Longitude of ZCTA centroid (fallback)"
      - name: best_latitude
        description: "Best available latitude (NCCS geocoded or ZCTA centroid)"
      - name: best_longitude
        description: "Best available longitude (NCCS geocoded or ZCTA centroid)"
      - name: zcta_land_area_sqmi
        description: "ZCTA land area in square miles"
      - name: zcta_water_area_sqmi
        description: "ZCTA water area in square miles"
      - name: has_zcta_match
        description: "True if ZIP code matched to a ZCTA (expect ~95%)"
        tests:
          - not_null

  - name: int_nonprofits_with_county_fips
    description: |
      Enriches bronze_organizations_nonprofits with county FIPS codes using two methods:
      
      **Method 1: census_county_name matching** (~790K matches, 40% of total)
      - Direct match on county name and state from NCCS geocoding
      - Handles "County" suffix variations (e.g., "Macoupin County" vs "Macoupin")
      - 98.6% success rate for records with census_county_name
      
      **Method 2: ZCTA-to-county mapping** (~814K additional matches, 42% of total)
      - Uses ZIP code to match via single-county ZCTAs
      - Only matches ZCTAs that map to exactly one county (avoids ambiguity)
      - 23,605 single-county ZCTAs out of 33,791 total (70%)
      - Applied to nonprofits without census_county_name
      
      **Overall results:**
      - Total matched: 1.6M nonprofits (82% of all nonprofits)
      - Unmatched: 348K (18%) - typically missing both county name and valid ZIP
      
      **Actual enrichment:**
      This is a documentation model. Actual enrichment is done via SQL script:
      `scripts/datasources/census/enrich_nonprofits_with_county_fips.sql`
      
      Used to:
      - Add county_fips column to bronze_organizations_nonprofits
      - Enable county-level nonprofit analysis and aggregation
      - Link nonprofits to county-level demographic data from ACS
    columns:
      - name: ein
        description: "Employer Identification Number (primary key)"
        tests:
          - unique
          - not_null
      - name: org_name
        description: "Organization name"
      - name: city
        description: "City from nonprofit address"
      - name: state_code
        description: "2-letter state code"
      - name: census_county_name
        description: "County name from NCCS geocoding (NULL for ZCTA-only matches)"
      - name: zip_code
        description: "ZIP code (used for ZCTA matching when census_county_name is NULL)"
      - name: county_fips
        description: "5-digit county FIPS code from bronze_jurisdictions"
      - name: matched_county_name
        description: "County name that matched (from census or ZCTA lookup)"
      - name: match_method
        description: "How the match was made: 'census_county_name' or 'zcta_single_county'"
      - name: has_county_fips
        description: "True if county FIPS was successfully matched"
        tests:
          - not_null
