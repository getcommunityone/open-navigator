version: 2

models:
  - name: int_persons_scraped
    description: >
      Usable scraped persons, deduplicated to one row per person per
      jurisdiction. First downstream consumer of the name-quality
      classification in stg_bronze_persons_scraped: filters to
      is_usable_person and collapses duplicate scrapes, keeping the most
      complete row (prefers email, then phone, then most recent scrape).
    columns:
      - name: person_key
        description: "Surrogate key: hash of (jurisdiction_id, normalized name). Grain of this model."
        tests:
          - unique
          - not_null
      - name: jurisdiction_id
        description: "Canonical {slug}_{geoid} jurisdiction id."
      - name: name
        description: "Cleaned/recovered person name (never null or junk — staging already filtered)."
        tests:
          - not_null
      - name: name_key
        description: "Normalized name used for the dedup partition."
        tests:
          - not_null
      - name: has_email
        description: "TRUE when the surviving row carries an email."
      - name: source_row_count
        description: "How many raw usable rows collapsed into this person (>=1)."
        tests:
          - not_null

  - name: int_jurisdictions
    description: >
      Unified silver jurisdictions table — union of Census Gazetteer counties,
      municipalities, school districts, and townships. Each row is one jurisdiction
      with standardized identifiers (GEOID, FIPS), state code, full state name,
      and location metadata.

    columns:
      - name: jurisdiction_id
        description: "Type-prefixed GEOID primary key (e.g. municipality_0601234)"
      - name: open_states_jurisdiction_id
        description: |
          Same as ``openstates_id`` — OCD jurisdiction id when the Open States ``division_id`` matches a
          Census GEOID via numeric place/county/school segment. NULL for most rows (slug divisions, townships, no match).
      - name: openstates_id
        description: "Alias of open_states_jurisdiction_id (Open States opencivicdata_jurisdiction.id)"
      - name: openstates_name
        description: "Open States jurisdiction name when the GEOID join matches; NULL otherwise"
      - name: openstates_classification
        description: "Open States jurisdiction classification (e.g. government) when matched; NULL otherwise"
      - name: geoid
        description: "Padded Census GEOID — 5 chars (county), 7 chars (municipality/school_district), 10 chars (township)"
        tests:
          - unique
          - not_null
      - name: fips_code
        description: "FIPS code (same as geoid for all types)"
      - name: state_fips_code
        description: "2-digit state FIPS code (LEFT(geoid, 2))"
        tests:
          - not_null
      - name: state_code
        description: "2-letter state abbreviation (USPS)"
        tests:
          - not_null
      - name: state
        description: "Full state name (e.g. 'California')"
      - name: name
        description: "Jurisdiction name from Census Gazetteer"
        tests:
          - not_null
      - name: jurisdiction_type
        description: "One of: county, municipality, school_district, township"
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['county', 'municipality', 'school_district', 'township']
      - name: ansicode
        description: "8-digit ANSI code (not available for school_districts)"
      - name: lsad
        description: "Legal/Statistical Area Description code (municipalities only)"
      - name: funcstat
        description: "Functional status code (municipalities and townships only)"
      - name: lograde
        description: "Lowest grade served (school_districts only)"
      - name: higrade
        description: "Highest grade served (school_districts only)"
      - name: area_sq_miles
        description: "Land area in square miles"
      - name: latitude
        description: "Internal point latitude"
      - name: longitude
        description: "Internal point longitude"
      - name: zip
        description: >
          Nearest ZCTA (5-digit) for non-county jurisdictions — only populated when project var
          `include_nearest_postal_zip` is true (otherwise NULL; default false for faster builds).
      - name: ingestion_date
        description: "When the bronze record was loaded"
      - name: transformed_at
        description: "When this silver record was created"

  - name: int_jurisdiction_websites
    description: >
      Materialized as ``intermediate.int_jurisdiction_websites`` (custom intermediate schema — not ``public``).
      Run ``dbt run --select int_jurisdiction_websites`` before expecting columns like ``website_source`` in the warehouse.

      For **GSA** rows, ``jurisdiction_id`` is ``COALESCE(URL match, name match, domain stem match)``:
      URL referral matches the same normalized site origin as USCM / NCES / NACo rows; otherwise a
      **name match** ties GSA ``organization``, ``agency``, and ``city`` (normalized via
      ``normalize_jurisdiction_label_for_match`` — St./Saint, parish/county, trailing ``", ST"`` on
      registrant fields, etc.) to ``int_jurisdictions`` in the same **state** and **domain_type**
      category (City/Town/Village/Borough→municipality, County→county, etc.), preferring organization
      exact match, then agency, then city, then prefix-style matches, then largest area. If those
      are still null, a **compact domain stem** match compares letters-only ``.gov`` host (optional
      trailing state code stripped) to letters-only ``name_norm`` for the same state and mapped type.

      Jurisdiction website URLs from multiple bronze sources: GSA .gov registry (cisagov/dotgov-data),
      US Conference of Mayors city sites (bronze_jurisdictions_municipalities_uscm.city_website),
      state municipal league directories (bronze_jurisdictions_municipalities_league.website),
      NCES CCD LEA directory (bronze_jurisdictions_school_districts_nces_directory.website),
      NACo county explorer (bronze_jurisdictions_counties_naco.website), plus optional
      **jurisdiction_website_url_overrides** (``website_source`` = ``override``). Federal agency .gov
      domains are excluded from the GSA slice only. ``website_source`` identifies lineage;
      ``website_record_key`` is unique per row. Downstream Python pickers rank **override** first,
      then **naco → gsa → …** for counties and **override → gsa → …** for other types.
    columns:
      - name: website_record_key
        description: >
          Stable unique key per row (e.g. gsa domain, uscm|ST|municipality, league|row_key,
          nces_directory|LEAID, naco|county GEOID, override|jurisdiction_id|md5(url) when multiple curated URLs exist).
        tests:
          - unique
          - not_null
      - name: website_source
        description: "Upstream lineage: gsa, uscm, league, nces_directory, naco, or override (seed)"
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['gsa', 'uscm', 'league', 'nces_directory', 'naco', 'override']
      - name: domain_name
        description: "Lowercase hostname when derivable from URL; for GSA rows the .gov domain"
      - name: website_url
        description: "Normalized https URL (scheme added when missing)"
        tests:
          - not_null
      - name: domain_type
        description: "Raw domain type from GSA only (City, County, etc.); NULL for non-GSA rows"
      - name: jurisdiction_category
        description: "Standardized jurisdiction category (municipality, county, state, school_district, township, special_district, other)"
      - name: organization_name
        description: "Organization or jurisdiction display name (GSA organization, USCM municipality, NCES district, NACo county)"
      - name: agency
        description: "Parent agency from GSA when present; NULL for other sources"
      - name: city
        description: "City from GSA registrant or USCM municipality name when applicable"
      - name: state_code
        description: "2-letter state abbreviation"
      - name: state
        description: "Full state name"
      - name: jurisdiction_id
        description: >
          int_jurisdictions GEOID key when matched. Non-GSA rows use name/GEOID joins from bronze.
          GSA: URL origin match to USCM / NCES directory / NACo website first, else former name+city match.
      - name: ingestion_date
        description: "When the bronze record was loaded"
      - name: transformed_at
        description: "When this silver record was created"

  - name: int_jurisdictions_scraped_discoveries
    description: >
      Union of ``bronze.bronze_jurisdictions_{states,municipalities,counties,school_districts}_scraped``:
      outputs from ``scripts/discovery/jurisdiction_discovery_pipeline.py`` (GSA bulk / deep scrape).
      Joins ``int_jurisdictions`` for municipality, county, and school rows; joins Census
      ``bronze_jurisdictions_states`` for state-class rows. Tables created by the discovery
      pipeline (or Neon migration 009, same DDL as ``scripts/discovery/sql/bronze_jurisdictions_scraped.sql``).
    columns:
      - name: geoid
        description: "Census GEOID (2 / 5 / 7 chars depending on jurisdiction_class)"
        tests:
          - not_null
      - name: usps
        description: "State USPS code"
      - name: jurisdiction_class
        description: "state | municipality | county | school_district"
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['state', 'municipality', 'county', 'school_district']
      - name: discovered_at
      - name: homepage_url
      - name: homepage_final_url
      - name: gsa_matched_domain
      - name: discovery_source
      - name: status
      - name: completeness_score
      - name: payload
        description: "Full discovery JSON (websites, YouTube, platforms, social, etc.)"
      - name: jurisdiction_id
        description: "From int_jurisdictions when join matches (NULL for unmatched or state rows without int row)"
      - name: census_or_payload_name
        description: "Best-effort display name from int_jurisdictions, state gazetteer, or payload"
      - name: transformed_at

  - name: int_trending_causes_by_jurisdiction
    description: |
      Aggregates trending causes by jurisdiction based on decisions in the last 90 days.
      Ranks causes by decision count and recency. Used to populate trending_causes JSON.
    columns:
      - name: state_code
        description: "Two-letter state code"
        tests:
          - not_null
      - name: state
        description: "Full state name"
      - name: jurisdiction_name
        description: "Name of jurisdiction (city/county/township)"
        tests:
          - not_null
      - name: jurisdiction_type
        description: "Type of jurisdiction (city, county, township)"
      - name: cause_category
        description: "Cause category (NTEE major group or primary theme)"
        tests:
          - not_null
      - name: cause_code
        description: "Cause code (NTEE code or COFOG code)"
      - name: decision_count
        description: "Number of decisions related to this cause in last 90 days"
        tests:
          - not_null
      - name: unique_topics
        description: "Number of unique topics under this cause"
      - name: most_recent_decision
        description: "Date of most recent decision for this cause"
      - name: avg_days_old
        description: "Average age (in days) of decisions for this cause"
      - name: sample_headlines
        description: "Array of up to 3 recent decision headlines"
      - name: cause_rank
        description: "Rank of this cause within the jurisdiction (1-10)"
        tests:
          - not_null
  
  - name: int_events_channels_registry
    description: >
      Channel-centric registry derived from `int_events_localview` channel_ids
      plus homepage-discovered channel_ids from
      `int_jurisdiction_homepage_youtube_channels`,
      enriched with `bronze_event_youtube` URLs (or canonical channel URL),
      official-homepage YouTube links from `int_jurisdiction_homepage_youtube_channels`,
      `jurisdictions` / `jurisdiction_ids`, and scalar `jurisdiction_id` (first sorted id)
      from `int_localview_channel_geography` joined to `int_jurisdictions`.
      Optional `channel_title`, `channel_description`, `subscriber_count`, `video_count`,
      `view_count` (lifetime channel views from About scrape), and `channel_external_links`
      from `bronze_events_channels`
      when present (see `channel_about_links.py`).
      Golden verified county/municipality rows live in ``intermediate.int_events_channels``
      (jurisdiction grain, migration 071; not a dbt model). Audit probes:
      ``intermediate.int_events_channels_candidates``.

  - name: int_youtube__events
    description: >
      LocalView-enriched YouTube meeting events, one row per video_id. Declarative
      replacement for packages/scrapers/src/scrapers/youtube/sync_bronze_youtube_from_localview.py:
      instead of UPDATE-ing geography onto bronze.bronze_event_youtube in place, this
      model derives it as a SELECT on stg_youtube__event, preferring LocalView geography
      (jurisdiction_name/type, city, state_code, state, meeting_type) when present and
      falling back to the YouTube row. channel_id is resolved from
      ``intermediate.int_localview_youtube_video_channels`` when available, else the
      YouTube row; channel_url falls back to the canonical channel URL.
    columns:
      - name: video_id
        description: "YouTube video id; grain of this model."
        tests:
          - unique
          - not_null
      - name: localview_enriched
        description: "TRUE when a LocalView row matched this video and contributed geography."

  - name: int_jurisdiction_homepage_youtube_channels
    description: >
      Homepage-discovered YouTube channels mapped back to canonical `int_jurisdictions`
      rows. This table keeps one best jurisdiction candidate per normalized YouTube URL
      from the scraped jurisdiction homepages and is used as a fallback in
      `int_events_channels_registry`.
    columns:
      - name: channel_url_norm
        description: "Normalized YouTube URL used as the join key"
        tests:
          - unique
          - not_null
      - name: jurisdiction_id
        description: "Canonical jurisdiction id for the homepage-discovered YouTube URL"
        tests:
          - not_null
      - name: discovery_method
        description: "Always derived_from_homepage_youtube_link for this model"

  - name: int_jurisdiction_meetings_scrape_youtube_channels
    description: >
      YouTube channel URLs from meetings crawl manifests
      (``bronze_events_meetings_*_scraped``), joined to canonical ``int_jurisdictions``.
      One row per jurisdiction + normalized channel URL. Feeds
      ``sync_bronze_jurisdiction_youtube_from_meetings_scrape.py``.
    columns:
      - name: jurisdiction_id
        tests:
          - not_null
      - name: channel_url_norm
        tests:
          - not_null
      - name: discovery_method
        description: "website_scrape for rows from meetings manifest YouTube links"

  - name: int_events_channels_enriched
    description: |
      Enriched YouTube channels with event statistics and quality scoring.
      Adds event counts, activity status, quality scores based on validation sources.
      Used by events_channels_search mart.
    columns:
      - name: channel_id
        description: "YouTube channel ID (unique)"
        tests:
          - unique
          - not_null
      - name: quality_score
        description: "Quality score (0-1) based on validation sources"
        tests:
          - not_null
      - name: is_likely_government
        description: "Boolean indicating if channel is likely a government channel"
      - name: event_count
        description: "Number of events/videos associated with this channel"
      - name: event_jurisdiction_count
        description: "Number of unique jurisdictions in channel's events"
      - name: activity_status
        description: "Channel activity: active, recent, stale, inactive, no_videos"
        tests:
          - not_null
          - accepted_values:
              values: ['active', 'recent', 'stale', 'inactive', 'no_videos']
      - name: days_since_last_video
        description: "Days since most recent video"
      - name: first_video_date
        description: "Date of first video"
      - name: latest_video_date
        description: "Date of most recent video"
        tests:
          - not_null
      - name: full_name_normalized
        description: "Normalized name for matching"
        tests:
          - not_null
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - full_name_normalized
            - org_id

  - name: int_localview_channel_geography
    description: >
      Maps LocalView-derived YouTube channels to jurisdiction geography by linking
      LocalView events (jurisdiction_name/state) to Census place/school district GEOIDs
      and then to counties via the place→county crosswalk.
  
  - name: int_nonprofits_irs_with_zcta
    description: |
      IRS nonprofits enriched with 5-digit ZCTA (ZIP Code Tabulation Area).
      ZCTAs are Census geographic approximations of ZIP codes that provide
      statistical boundaries for geographic analysis. Includes ZCTA centroid
      coordinates and land/water area.
    columns:
      - name: ein
        description: "Employer Identification Number (primary key)"
        tests:
          - unique
          - not_null
      - name: zip_code
        description: "Original ZIP code (may include ZIP+4)"
      - name: zip_code_5
        description: "Normalized 5-digit ZIP code"
      - name: zcta_5
        description: "Census 5-digit ZIP Code Tabulation Area"
      - name: zcta_latitude
        description: "Latitude of ZCTA centroid"
      - name: zcta_longitude
        description: "Longitude of ZCTA centroid"
      - name: zcta_land_area_sqmi
        description: "ZCTA land area in square miles"
      - name: zcta_water_area_sqmi
        description: "ZCTA water area in square miles"
      - name: has_zcta_match
        description: "True if ZIP code matched to a ZCTA (expect ~95%)"
        tests:
          - not_null
  
  - name: int_nonprofits_nccs_with_zcta
    description: |
      NCCS nonprofits enriched with 5-digit ZCTA (ZIP Code Tabulation Area).
      ZCTAs are Census geographic approximations of ZIP codes that provide
      statistical boundaries for geographic analysis. Includes ZCTA centroid
      coordinates as fallback for organizations without geocoding.
    columns:
      - name: ein
        description: "Employer Identification Number (primary key)"
        tests:
          - unique
          - not_null
      - name: f990_org_addr_zip
        description: "Original ZIP code from 990 filing (may include ZIP+4)"
      - name: zip_code_5
        description: "Normalized 5-digit ZIP code"
      - name: zcta_5
        description: "Census 5-digit ZIP Code Tabulation Area"
      - name: latitude
        description: "NCCS geocoded latitude (from address geocoding)"
      - name: longitude
        description: "NCCS geocoded longitude (from address geocoding)"
      - name: zcta_latitude
        description: "Latitude of ZCTA centroid (fallback)"
      - name: zcta_longitude
        description: "Longitude of ZCTA centroid (fallback)"
      - name: best_latitude
        description: "Best available latitude (NCCS geocoded or ZCTA centroid)"
      - name: best_longitude
        description: "Best available longitude (NCCS geocoded or ZCTA centroid)"
      - name: zcta_land_area_sqmi
        description: "ZCTA land area in square miles"
      - name: zcta_water_area_sqmi
        description: "ZCTA water area in square miles"
      - name: has_zcta_match
        description: "True if ZIP code matched to a ZCTA (expect ~95%)"
        tests:
          - not_null

  - name: int_nonprofits_with_county_fips
    description: |
      Enriches bronze_organizations_nonprofits with county FIPS codes using two methods:
      
      **Method 1: census_county_name matching** (~790K matches, 40% of total)
      - Direct match on county name and state from NCCS geocoding
      - Handles "County" suffix variations (e.g., "Macoupin County" vs "Macoupin")
      - 98.6% success rate for records with census_county_name
      
      **Method 2: ZCTA-to-county mapping** (~814K additional matches, 42% of total)
      - Uses ZIP code to match via single-county ZCTAs
      - Only matches ZCTAs that map to exactly one county (avoids ambiguity)
      - 23,605 single-county ZCTAs out of 33,791 total (70%)
      - Applied to nonprofits without census_county_name
      
      **Overall results:**
      - Total matched: 1.6M nonprofits (82% of all nonprofits)
      - Unmatched: 348K (18%) - typically missing both county name and valid ZIP
      
      **Actual enrichment:**
      This is a documentation model. Actual enrichment is done via SQL script:
      `pipeline/census/enrich_nonprofits_with_county_fips.sql`
      
      Used to:
      - Add county_fips column to bronze_organizations_nonprofits
      - Enable county-level nonprofit analysis and aggregation
      - Link nonprofits to county-level demographic data from ACS
    columns:
      - name: ein
        description: "Employer Identification Number (primary key)"
        tests:
          - unique
          - not_null
      - name: org_name
        description: "Organization name"
  
  - name: int_jurisdictions_clean
    description: >
      Cleaned and standardized jurisdictions from Census Bureau data.
      Applies data quality fixes to bronze_jurisdictions including GEOID padding,
      FIPS code standardization, and data quality flags.
      
      Replaces: scripts/datasources/census/fix_geoid_format.py
    columns:
      - name: id
        description: Primary key from bronze layer
        tests:
          - unique
          - not_null
      - name: geoid_clean
        description: Cleaned GEOID padded to correct length (2, 5, 7, or 10 digits)
        tests:
          - not_null
      - name: fips_code_clean
        description: Cleaned FIPS code padded to correct length
      - name: type
        description: Jurisdiction type (state, county, city, town, etc.)
        tests:
          - not_null
      - name: state_code
        description: 2-letter state abbreviation
        tests:
          - not_null
      - name: jurisdiction_category
        description: High-level categorization of jurisdiction type
        tests:
          - accepted_values:
              values: ['municipality', 'census_designated_place', 'county', 'state', 'township', 'school_district', 'other']
  
  - name: int_jurisdictions_linked
    description: >
      Jurisdictions with normalized names and linking metadata.
      Prepares data for matching with external databases and building gold layer.
      
      Replaces: pipeline/census/link_cities_counties_to_search.py
    columns:
      - name: id
        description: Primary key
        tests:
          - unique
          - not_null
      - name: name_normalized
        description: Normalized name with suffixes removed for fuzzy matching
      - name: name_clean
        description: Cleaned name with "City of" patterns standardized
      - name: search_text
        description: Concatenated searchable text (name + state + type)
      - name: match_confidence
        description: Confidence score for matching (0.5 to 1.0)
  
  - name: int_nonprofits_combined
    description: >
      Combined nonprofit data from IRS BMF and NCCS sources, deduplicated by EIN.
      Merges financial data, geographic data, and classifications.
      Priority: NCCS for detailed financials, IRS for base organization info.
      
      Source Tables:
      - bronze_organizations_nonprofits_irs (1.95M orgs)
      - bronze_organizations_nonprofits_nccs (1.8M orgs)
      
      Deduplication: Full outer join on EIN, COALESCE to prefer NCCS data
    columns:
      - name: ein
        description: Employer Identification Number (primary key)
        tests:
          - unique
          - not_null
      - name: name
        description: Organization name
        tests:
          - not_null
      - name: city
        description: Organization city
        tests:
          - not_null
      - name: state_code_clean
        description: 2-letter state code (uppercase, cleaned)
        tests:
          - not_null
      - name: ntee_code
        description: National Taxonomy of Exempt Entities classification code
      - name: datasource
        description: "Source of data: 'irs_bmf', 'nccs', or 'irs_bmf,nccs' if both"
        tests:
          - not_null
          - accepted_values:
              values: ['irs_bmf', 'nccs', 'irs_bmf,nccs']
      - name: city
        description: "City from nonprofit address"
      - name: state_code
        description: "2-letter state code"
      - name: census_county_name
        description: "County name from NCCS geocoding (NULL for ZCTA-only matches)"
      - name: zip_code
        description: "ZIP code (used for ZCTA matching when census_county_name is NULL)"
      - name: county_fips
        description: "5-digit county FIPS code from bronze_jurisdictions"
      - name: matched_county_name
        description: "County name that matched (from census or ZCTA lookup)"
      - name: match_method
        description: "How the match was made: 'census_county_name' or 'zcta_single_county'"
      - name: has_county_fips
        description: "True if county FIPS was successfully matched"
        tests:
          - not_null

  - name: int_wikidata__jurisdictions_enriched
    description: |
      APPLY step for the Wikidata enrichment: LEFT JOINs the seeded *_wikidata
      base rows (stg_wikidata__jurisdiction_*) to the cached Wikidata enrichment
      (stg_wikidata__enrichment) on the reconciled GEOID — replacing the Python
      "UPDATE bronze_jurisdictions_*_wikidata SET ... WHERE geoid = ..." from the
      archived load_jurisdictions_wikidata.py. One row per (jurisdiction_type,
      geoid); unmatched seed rows carry NULL enrichment (== a NULL wikidata_id
      row after a partial run). county / city / school_district only.

      FLAG: identifier-clean matching only. The Python loader's fuzzy
      name-matching + wbsearchentities entity-search recovery is NOT reproduced
      here (stays a scraper in scripts/). State-level descriptive metadata is
      also not modeled yet (FETCH bulk-maps only the three GEOID types).
    columns:
      - name: geoid
        description: "Census GEOID (5-digit county, 7-digit municipality/school district)."
        tests:
          - not_null
      - name: state_code
        description: "2-letter USPS code."
        tests:
          - not_null
      - name: jurisdiction_type
        description: "county | city | school_district."
        tests:
          - not_null
          - accepted_values:
              values: ['county', 'city', 'school_district']
      - name: wikidata_id
        description: "Matched Wikidata Q-item id (NULL when unmatched)."
      - name: official_website
        description: "P856 official website (NULL when unmatched)."
      - name: dbt_loaded_at
        description: "When this model was materialized."
        tests:
          - not_null
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - jurisdiction_type
            - geoid

  - name: int_events_union
    description: >
      Unified candidate list of meeting videos for transcript fetching. Reads
      the `event` production mart (which already unions CDP/YouTube events with
      promoted LocalView meetings), narrows to rows with a fetchable YouTube
      video, derives the video_id, and dedups to one row per video_id (YouTube
      source preferred). Consumed by scrapers.youtube.backfill_transcripts to
      decide which videos still need a transcript landed in
      bronze.bronze_event_youtube_transcript. Add a new source to marts.event to pull
      transcripts for it.
    columns:
      - name: video_id
        description: "YouTube video id — grain of this model (one row per video)."
        tests:
          - unique
          - not_null
      - name: video_url
        description: "Source video URL passed to the transcript fetcher."
        tests:
          - not_null
      - name: source
        description: "Originating event source for this video."
        tests:
          - accepted_values:
              values: ['youtube', 'localview']
      - name: event_id
        description: >
          Canonical event_id from the `event` mart (LocalView events are
          promoted into that mart, so this is a real global key for both
          sources).

  - name: int_events_civicsearch__localview_xref
    description: >
      Bridges CivicSearch meetings to the unified event spine. CivicSearch
      meetings are YouTube videos (vid_id == int_events_union.video_id); this
      model left-joins the two on that id so downstream marts can attach
      CivicSearch policy-topic tags + transcript snippets to an existing event,
      and so unmatched meetings (CivicSearch has them, LocalView/YouTube ingest
      missed them) are visible via is_in_event_union = false. Grain: one row per
      CivicSearch meeting (vid_id).
    columns:
      - name: vid_id
        description: "YouTube video id — grain of this model (one row per CivicSearch meeting)."
        tests:
          - unique
          - not_null
      - name: is_in_event_union
        description: "TRUE when this vid_id matches a row in int_events_union."
        tests:
          - not_null
      - name: event_id
        description: "Canonical event_id from int_events_union; NULL when unmatched."
      - name: meeting_date
        description: "CivicSearch-reported meeting date."
      - name: num_snippets
        description: "Count of CivicSearch transcript snippets on this meeting."
      - name: num_topics
        description: "Count of distinct CivicSearch topic ids on this meeting."
