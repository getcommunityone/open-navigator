version: 2

seeds:
  - name: tax_foundation_sales_tax_rates
    config:
      column_types:
        state_code: text
        state: text
        state_sales_tax_rate: numeric
        avg_local_sales_tax_rate: numeric
        combined_sales_tax_rate: numeric
        combined_rank: integer
        max_local_sales_tax_rate: numeric
        as_of_date: date
        vintage_year: integer
    description: >
      Combined state + average-local general sales-tax rates by state (50 states +
      DC), from the Tax Foundation report "State and Local Sales Tax Rates, 2026"
      (https://taxfoundation.org/data/all/state/sales-tax-rates/), as of
      2026-01-01. Rates are PERCENTAGES exactly as published (e.g. 9.46 = 9.46%);
      avg_local is population-weighted and can be slightly negative where the
      state mandates reduced-rate zones (e.g. New Jersey UEZ). Census publishes
      sales-tax revenue but NOT rates, so this is the standard free rate source.
      Feeds public.state_sales_tax_rate. Refresh annually: re-pull the report's
      table, replace this CSV, then `dbt seed --select tax_foundation_sales_tax_rates`.
    columns:
      - name: state_code
        description: "2-letter postal code (PK)."
        tests:
          - unique
          - not_null
      - name: state
        description: "Full state name."
        tests: [not_null]
      - name: state_sales_tax_rate
        description: "State-level statutory sales-tax rate, percent."
        tests: [not_null]
      - name: avg_local_sales_tax_rate
        description: "Population-weighted average local sales-tax rate, percent."
        tests: [not_null]
      - name: combined_sales_tax_rate
        description: "Published combined state + average-local rate, percent."
        tests: [not_null]
      - name: combined_rank
        description: "Tax Foundation rank by combined rate (1 = highest). NULL for DC."
      - name: max_local_sales_tax_rate
        description: "Highest local rate found in the state, percent."
      - name: as_of_date
        description: "Effective date of the published rates."
      - name: vintage_year
        description: "Report vintage year."

  - name: jurisdiction_website_domain_denylist
    description: >
      Lowercase hostname only (no scheme). Rows are removed from int_jurisdiction_websites for every
      source where domain_name matches. Curate manually for verified wrong or non-governmental hosts.
    columns:
      - name: domain
        description: "FQDN to exclude, e.g. wilcoxcountyal.gov"

  - name: curated_policy_questions
    description: >
      Hand-authored, editorial "featured" policy questions unioned into
      public.policy_question as is_featured=true rows. NOT LLM-clustered. Real,
      hand-verified decisions can be attached via the curated_question_instance
      seed; rollup/comparative counts then reflect ONLY those verified instances
      (a featured question with no curated instances shows an honest empty rollup —
      never fabricated numbers). question_id is derived in the mart as
      md5(primary_theme || '|' || canonical_text), matching the clustered PK
      convention. topic_code/cofog_code are intentionally empty until curated.
      After editing: dbt seed --select curated_policy_questions && dbt run --select policy_question.
    columns:
      - name: canonical_text
        description: "The featured question phrased neutrally; verbatim editorial copy."
        tests:
          - unique
          - not_null
      - name: primary_theme
        description: "Coarse COFOG theme bucket; part of the md5 question_id."
        tests:
          - not_null
      - name: topic_code
        description: "CAP topic code; left empty for editorial questions (relationships test is warn/null-tolerant)."
      - name: cofog_code
        description: "COFOG code; left empty for editorial questions."
      - name: display_order
        description: "1-based sort order for the featured row on the home page / search."
        tests:
          - unique
          - not_null
      - name: aliases
        description: >
          Optional pipe-delimited ('|') list of alternate search terms for the
          question (e.g. brand/colloquial names that no longer appear in the
          neutral canonical_text). Split into a text[] in the policy_question
          mart and matched alongside canonical_text by /search. Empty for most
          rows; e.g. the short-term-rental question carries 'airbnb|vrbo'.

  - name: curated_question_instance
    description: >
      Hand-verified, genuinely on-topic real local decisions attached to a curated
      featured question (curated_policy_questions). Each row is a REAL event_decision
      (source_id = event_decision_id) whose denormalized fields (state/jurisdiction/
      city/outcome/occurred_at) were captured verbatim from public.event_decision —
      no fabricated instances. Unioned into stg_question_instance as
      source_type='local_decision'; the existing outcome normalization + rollup then
      produce the comparative counts for the featured question. A featured question
      with no rows here stays honestly empty. Survives the LLM clustering rebuild,
      which only truncates the bronze_* tables, not seeds.
      After editing: dbt seed --select curated_question_instance &&
      dbt run --select stg_question_instance int_policy_question_rollup policy_question question_instance.
    columns:
      - name: question_id
        description: "Curated featured question this decision instantiates (md5 PK from curated_policy_questions)."
        tests:
          - not_null
      - name: source_id
        description: "Real public.event_decision.event_decision_id. Together with question_id forms the instance PK."
        tests:
          - not_null
      - name: state_code
        description: "2-letter state of the decision (verbatim from event_decision; may be empty when source is null)."
      - name: jurisdiction_name
        description: "Jurisdiction of the decision (verbatim from event_decision; may be empty)."
      - name: city
        description: "City of the decision (verbatim from event_decision; may be empty)."
      - name: outcome_raw
        description: "Free-text decision outcome (verbatim); normalized in stg_question_instance."
      - name: occurred_at
        description: "When the decision was recorded (event_decision.extracted_at)."

  - name: policy_theme_cofog
    description: >
      Maps each canonical policy-decision primary_theme label (the 18-label COFOG
      civic-theme vocabulary) to its COFOG code. Single source of truth mirrored from
      packages/llm/src/llm/gemini/policy_themes.py (THEME_TO_COFOG). Joined into
      int_trending_causes_by_jurisdiction to derive cause_code from the bronze label.
      After editing: dbt seed --select policy_theme_cofog.
    columns:
      - name: primary_theme
        description: "Canonical theme label, verbatim from bronze.bronze_policy_decisions.primary_theme"
        tests:
          - unique
          - not_null
      - name: cofog_code
        description: "COFOG-NN code for the theme (e.g. COFOG-01)"
        tests:
          - not_null

  - name: official_photo_override
    # Pin text types: biography/source_url are often all-empty on first seed, which
    # otherwise infers to integer and breaks trim()/coalesce in downstream models.
    config:
      column_types:
        full_name: text
        state_code: text
        photo_url: text
        biography: text
        source_url: text
    description: >
      Manual/scraped headshot URL and biography for officials whose source
      (OpenStates) carries neither — e.g. mayors, whose photo and bio live on a
      city department / "meet the <office>" page, not the council page. LEFT
      JOINed into contact_official and coalesced over photo_url + biography
      (matched on lower(full_name) + state_code), so it patches the existing row
      without duplicating it. Regenerate from city sites via
      scrapers.municipal.council_roster.scrape_official_profile (OFFICIAL_PROFILE_SOURCES),
      e.g. `python -m scrapers.municipal.council_roster --profiles atlanta`;
      photo_url carries a Drupal ?itok= token that can expire — re-scrape to refresh.
      After editing: dbt seed --select official_photo_override && dbt run --select contact_official
    columns:
      - name: full_name
        description: "Official's full name; matched case-insensitively to contact_official.full_name"
        tests:
          - not_null
      - name: state_code
        description: "2-letter USPS code, disambiguates same-named officials across states"
        tests:
          - not_null
      - name: photo_url
        description: "Absolute headshot URL (https://…)"
        tests:
          - not_null
      - name: biography
        description: "Scraped biography prose for the official; nullable (empty when only a photo is overridden)"
      - name: source_url
        description: "Page the photo/bio was scraped from (provenance)"

  - name: interestingness_weights
    description: >
      Tunable per-component weights for public.item_interestingness. One row per
      component; the composite is a weight-normalized average so retuning never
      breaks the 0–100 bound. Read via the civic_component_weights() macro — never
      hardcoded in a model. After editing: dbt seed --select interestingness_weights
      && dbt run --select item_interestingness. Keep the component set in sync with
      the macro and int_civic__item_signal_norms.
    config:
      column_types:
        component: text
        weight: double precision
    columns:
      - name: component
        description: "Component name: conflict|money|novelty|engagement|surprise|urgency|buried"
        tests:
          - unique
          - not_null
          - accepted_values:
              values: ['conflict', 'money', 'novelty', 'engagement', 'surprise', 'urgency', 'buried']
      - name: weight
        description: "Non-negative weight; the set is normalized by its sum at score time."
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
              max_value: 1

  - name: lens_config
    description: >
      Drives the per-lens serving feed (rank_for_user macro): one row per story
      lens. eligibility_sql + sort_expr are SQL fragments evaluated against
      item_interestingness columns, so adding/retuning a lens is a config change,
      not new SQL. After editing: dbt seed --select lens_config.
    config:
      column_types:
        lens_id: text
        eligibility_sql: text
        sort_expr: text
        direction: text
    columns:
      - name: lens_id
        description: "Lens key: default|contested|money|new|people|changed|soon|slipped|near"
        tests:
          - unique
          - not_null
      - name: eligibility_sql
        description: "Boolean SQL fragment over item_interestingness columns (lens eligibility filter)."
        tests:
          - not_null
      - name: sort_expr
        description: "Column/expression the lens sorts by (default feed -> interestingness_score)."
        tests:
          - not_null
      - name: direction
        description: "Sort direction for sort_expr."
        tests:
          - not_null
          - accepted_values:
              values: ['asc', 'desc']

  - name: jurisdiction_website_url_overrides
    description: >
      Manual canonical website per jurisdiction_id when bronze/GSA/NACo rows are missing or wrong.
      Rows are unioned into int_jurisdiction_websites with website_source = override and win first in
      downstream URL pickers. After editing: dbt seed --select jurisdiction_website_url_overrides &&
      dbt run --select int_jurisdiction_websites
    columns:
      - name: jurisdiction_id
        description: "Primary key matching int_jurisdictions (e.g. county_01093)"
      - name: website_url
        description: "Full site URL (https://…); normalized like other sources"
