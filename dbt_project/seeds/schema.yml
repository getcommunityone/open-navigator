version: 2

seeds:
  - name: jurisdiction_website_domain_denylist
    description: >
      Lowercase hostname only (no scheme). Rows are removed from int_jurisdiction_websites for every
      source where domain_name matches. Curate manually for verified wrong or non-governmental hosts.
    columns:
      - name: domain
        description: "FQDN to exclude, e.g. wilcoxcountyal.gov"

  - name: policy_theme_cofog
    description: >
      Maps each canonical policy-decision primary_theme label (the 18-label COFOG
      civic-theme vocabulary) to its COFOG code. Single source of truth mirrored from
      packages/llm/src/llm/gemini/policy_themes.py (THEME_TO_COFOG). Joined into
      int_trending_causes_by_jurisdiction to derive cause_code from the bronze label.
      After editing: dbt seed --select policy_theme_cofog.
    columns:
      - name: primary_theme
        description: "Canonical theme label, verbatim from bronze.bronze_policy_decisions.primary_theme"
        tests:
          - unique
          - not_null
      - name: cofog_code
        description: "COFOG-NN code for the theme (e.g. COFOG-01)"
        tests:
          - not_null

  - name: official_photo_override
    # Pin text types: biography/source_url are often all-empty on first seed, which
    # otherwise infers to integer and breaks trim()/coalesce in downstream models.
    config:
      column_types:
        full_name: text
        state_code: text
        photo_url: text
        biography: text
        source_url: text
    description: >
      Manual/scraped headshot URL and biography for officials whose source
      (OpenStates) carries neither — e.g. mayors, whose photo and bio live on a
      city department / "meet the <office>" page, not the council page. LEFT
      JOINed into contact_official and coalesced over photo_url + biography
      (matched on lower(full_name) + state_code), so it patches the existing row
      without duplicating it. Regenerate from city sites via
      scrapers.municipal.council_roster.scrape_official_profile (OFFICIAL_PROFILE_SOURCES),
      e.g. `python -m scrapers.municipal.council_roster --profiles atlanta`;
      photo_url carries a Drupal ?itok= token that can expire — re-scrape to refresh.
      After editing: dbt seed --select official_photo_override && dbt run --select contact_official
    columns:
      - name: full_name
        description: "Official's full name; matched case-insensitively to contact_official.full_name"
        tests:
          - not_null
      - name: state_code
        description: "2-letter USPS code, disambiguates same-named officials across states"
        tests:
          - not_null
      - name: photo_url
        description: "Absolute headshot URL (https://…)"
        tests:
          - not_null
      - name: biography
        description: "Scraped biography prose for the official; nullable (empty when only a photo is overridden)"
      - name: source_url
        description: "Page the photo/bio was scraped from (provenance)"

  - name: jurisdiction_website_url_overrides
    description: >
      Manual canonical website per jurisdiction_id when bronze/GSA/NACo rows are missing or wrong.
      Rows are unioned into int_jurisdiction_websites with website_source = override and win first in
      downstream URL pickers. After editing: dbt seed --select jurisdiction_website_url_overrides &&
      dbt run --select int_jurisdiction_websites
    columns:
      - name: jurisdiction_id
        description: "Primary key matching int_jurisdictions (e.g. county_01093)"
      - name: website_url
        description: "Full site URL (https://…); normalized like other sources"
