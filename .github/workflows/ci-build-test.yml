name: CI - Build & Test

# Run on all pushes and pull requests to catch build errors early
on:
  # Reusable: deploy-huggingface.yml calls this via `uses:`, which requires the
  # workflow_call trigger — without it the deploy dispatch fails to parse
  # ("workflow is not reusable as it is missing a `on.workflow_call` trigger").
  workflow_call:
  push:
    branches:
      - main
      - develop
      - huggingface-deploy  # Test deploy branch before HF build
  pull_request:
    branches:
      - main
      - develop

jobs:
  # Test 1: Frontend TypeScript Build
  frontend-build:
    name: Frontend Build (TypeScript + Vite)
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web_app/package-lock.json

      - name: Install frontend dependencies
        run: |
          cd web_app
          npm ci

      - name: Run TypeScript type check
        run: |
          cd web_app
          npx tsc --noEmit

      - name: Build frontend
        run: |
          cd web_app
          npm run build

      - name: Check build artifacts
        run: |
          if [ ! -d "api/static/assets" ]; then
            echo "❌ Frontend build failed - no api/static/assets directory"
            exit 1
          fi
          echo "✅ Frontend build successful"

  # Test 2: Documentation Site Build
  # CRITICAL: This catches Docusaurus config errors (like duplicate gtag) before HuggingFace deployment
  docs-build:
    name: Documentation Build (Docusaurus)
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web_docs/package-lock.json

      - name: Install docs dependencies
        run: |
          cd web_docs
          npm ci

      - name: Build documentation
        run: |
          cd web_docs
          npm run build

      - name: Check build artifacts
        run: |
          if [ ! -d "web_docs/build" ]; then
            echo "❌ Docs build failed - no build directory"
            exit 1
          fi
          echo "✅ Documentation build successful"

  # Test 3: Python Backend
  backend-test:
    name: Backend Tests (Python)
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # config/agents/models/ingestion now live under packages/; install them so
          # they import as top-level modules (--no-deps keeps the closure unchanged).
          # ingestion is needed since main.py/api import `ingestion.delta_lake`
          # (formerly the root `pipeline/` tree). llm is needed since the
          # meeting_comparison route imports `llm.gemini.*`.
          pip install --no-deps -e packages/core -e packages/datamodels -e packages/agents -e packages/ingestion -e packages/llm

      - name: Check Python syntax
        run: |
          python -m py_compile main.py
          find api -name "*.py" -exec python -m py_compile {} \;
          echo "✅ Python syntax check passed"

      - name: Import test
        run: |
          python -c "import main; print('✅ Main module imports successfully')"
          python -c "from api.app import app; print('✅ API app imports successfully')"

  # Test 5: API contract types (OpenAPI -> TypeScript)
  # Regenerates web_app/src/lib/api.types.ts from the live FastAPI schema
  # (api.app:app) and type-checks the *regenerated* file against the frontend
  # consumers. A backend contract change that would break a typed call site
  # (wrong path, missing field, renamed param) fails CI here rather than at
  # runtime. The committed api.types.ts is a snapshot for local DX/IDE; refresh
  # it locally with `npm run gen:api` when you touch the backend contract.
  api-types:
    name: API Types (OpenAPI -> TypeScript)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web_app/package-lock.json

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # Mirror backend-test: local workspace packages import as top-level modules.
          # ingestion included so export_openapi.py -> api.app import resolves.
          # llm included so the meeting_comparison route's `llm.gemini.*` import resolves.
          pip install --no-deps -e packages/core -e packages/datamodels -e packages/agents -e packages/ingestion -e packages/llm

      - name: Install frontend dependencies
        run: |
          cd web_app
          npm ci

      - name: Regenerate API types from the FastAPI schema
        run: |
          cd web_app
          npm run gen:api
          test -s src/lib/api.types.ts || { echo "::error::api.types.ts was not generated"; exit 1; }

      - name: Type-check regenerated types against the frontend consumers
        run: |
          cd web_app
          if ! npx tsc --noEmit; then
            echo "::error::Frontend consumers no longer match the FastAPI schema. Update the typed call site, or refresh src/lib/api.types.ts locally with 'npm run gen:api' and commit."
            exit 1
          fi
          echo "Regenerated API types are compatible with all frontend consumers"

  # Test 4: Docker Build (Full Integration Test)
  # Gate: the full-stack image build is expensive (~minutes). On PRs, only run it
  # when Docker-relevant files change — most PRs (dbt, packages, backend logic,
  # docs content) can't affect the image and the dedicated frontend/docs/backend
  # jobs already cover source build breakage. Pushes to the deploy branches always
  # build (the `if` on docker-build short-circuits the filter for push events).
  changes:
    name: Detect Docker-relevant changes
    runs-on: ubuntu-latest
    outputs:
      docker: ${{ steps.filter.outputs.docker }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            docker:
              - 'Dockerfile.huggingface'
              - 'requirements.txt'
              - 'web_app/package*.json'
              - 'web_docs/package*.json'
              - '.huggingface/**'
              - '.github/workflows/ci-build-test.yml'

  docker-build:
    name: Docker Build Test (Full Stack)
    runs-on: ubuntu-latest
    needs: [frontend-build, docs-build, backend-test, changes]
    if: github.event_name != 'pull_request' || needs.changes.outputs.docker == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.huggingface
          push: false
          tags: test-build:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Report success
        run: |
          echo "✅ All builds passed!"
          echo "✅ Frontend: TypeScript + Vite"
          echo "✅ Documentation: Docusaurus"
          echo "✅ Backend: Python imports"
          echo "✅ Docker: Full stack build"
