[pytest]
testpaths = tests packages/agents packages/ingestion/tests packages/scrapers/tests
pythonpath = . packages/scrapers/src packages/ingestion/src packages/agents packages/core-lib/src
python_files = test_*.py
norecursedirs =
    .git .venv __pycache__ *.egg-info
    archive scripts web_app web_docs apps api infra
    packages/scrapers/src packages/ingestion/src packages/agents packages/core-lib/src
filterwarnings =
    ignore:datetime\.datetime\.utcfromtimestamp\(\) is deprecated.*:DeprecationWarning